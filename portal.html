<!DOCTYPE html>
<html lang="es">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portal de Pedidos</title>
  <script src="https://cdn.tailwindcss.com"></script><script>window.GASTRO_GAS_URL = 'https://script.google.com/macros/s/AKfycbxCeMjYmQ66V3p1f4lq9Sg3Q7OAC3YcXMnhawmsk8FE_5P0mXnU19vKyaPTfExUGgaZ6w/exec';</script>
<script src="/gas-bridge.js"></script>
  <style>
    * { box-sizing: border-box; }
    body { font-family: system-ui, -apple-system, sans-serif; }
    .view { display: none; }
    .view.active { display: block; }
    .toast { opacity: 0; transform: translateY(10px); transition: all .2s ease; }
    .toast.active { opacity: 1; transform: translateY(0); }
    .producto-card { transition: border-color .18s ease, box-shadow .18s ease, transform .18s ease; }
    .producto-card.added { border-color: #10b981; box-shadow: 0 0 0 3px rgba(16, 185, 129, .15); transform: translateY(-1px); }
    .btn-spinner { display: inline-block; width: 1rem; height: 1rem; border: 2px solid currentColor; border-right-color: transparent; border-radius: 9999px; animation: spin .8s linear infinite; vertical-align: -0.15em; margin-right: .45rem; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-900">
  <header class="bg-white border-b border-slate-200 sticky top-0 z-30">
    <div class="max-w-5xl mx-auto px-4 py-4 flex items-center justify-between gap-4">
      <div>
        <h1 class="text-xl font-bold">Monnoshop</h1>
        <p class="text-sm text-slate-500">Portal de pedidos</p>
      </div>
      <div class="flex items-center gap-3 text-sm">
        <button onclick="Portal.mostrar('catalogo')" class="text-slate-700 hover:text-slate-950">Carta</button>
        <button onclick="Portal.mostrar('pedidos')" class="text-slate-700 hover:text-slate-950">Mis pedidos</button>
        <button onclick="Portal.mostrar('carrito')" class="relative px-3 py-2 bg-slate-900 text-white rounded-lg">
          Pedido
          <span id="cart-count" class="absolute -top-2 -right-2 min-w-5 h-5 px-1 bg-red-500 text-white text-xs rounded-full flex items-center justify-center">0</span>
        </button>
      </div>
    </div>
  </header>

  <main class="max-w-5xl mx-auto px-4 py-6">
    <section id="view-catalogo" class="view active">
      <div class="mb-5 grid grid-cols-1 md:grid-cols-[1fr_auto] gap-3">
        <input id="search" type="text" placeholder="Buscar productos..." class="px-4 py-3 bg-white border border-slate-200 rounded-xl" oninput="Portal.renderCatalogo()">
        <button onclick="Portal.mostrar('carrito')" class="px-4 py-3 bg-slate-900 text-white rounded-xl font-medium">Ver pedido</button>
      </div>
      <div id="catalogo" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
        <p class="text-slate-500">Cargando carta...</p>
      </div>
    </section>

    <section id="view-carrito" class="view">
      <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
        <div class="lg:col-span-2 bg-white border border-slate-200 rounded-2xl overflow-hidden">
          <div class="p-5 border-b border-slate-200">
            <h2 class="text-lg font-bold">Tu pedido</h2>
          </div>
          <div id="carrito-items" class="p-5">
            <p class="text-slate-500 text-center py-8">Todavia no agregaste productos</p>
          </div>
        </div>

        <aside class="bg-white border border-slate-200 rounded-2xl p-5 h-fit">
          <div class="flex justify-between items-center mb-4">
            <span class="font-semibold">Total</span>
            <span id="total" class="text-2xl font-bold text-amber-600">$0.00</span>
          </div>

          <div class="space-y-3">
            <input id="cliente-nombre" type="text" placeholder="Nombre y apellido" class="w-full px-3 py-2 border border-slate-200 rounded-lg">
            <input id="cliente-telefono" type="tel" placeholder="Telefono" class="w-full px-3 py-2 border border-slate-200 rounded-lg">
            <input id="cliente-dni" type="text" placeholder="DNI / CUIT (opcional)" class="w-full px-3 py-2 border border-slate-200 rounded-lg">
            <input id="cliente-email" type="email" placeholder="Email (opcional)" class="w-full px-3 py-2 border border-slate-200 rounded-lg">
            <input id="fecha-entrega" type="date" class="w-full px-3 py-2 border border-slate-200 rounded-lg">
            <input id="direccion" type="text" placeholder="Direccion (opcional si retira)" class="w-full px-3 py-2 border border-slate-200 rounded-lg">
            <textarea id="notas" rows="3" placeholder="Notas, alergias, aclaraciones" class="w-full px-3 py-2 border border-slate-200 rounded-lg"></textarea>
            <select id="medio-pago" class="w-full px-3 py-2 border border-slate-200 rounded-lg">
              <option value="Transferencia">Transferencia</option>
              <option value="Mercado Pago">Mercado Pago</option>
            </select>
          </div>

          <div class="grid grid-cols-2 gap-2 mt-5">
            <button onclick="Portal.mostrar('catalogo')" class="px-4 py-3 border border-slate-200 rounded-lg font-medium">Seguir</button>
            <button id="btn-enviar" onclick="Portal.enviarPedido()" class="px-4 py-3 bg-emerald-600 text-white rounded-lg font-medium">Enviar</button>
          </div>
          <div id="resultado" class="mt-4 text-sm"></div>
        </aside>
      </div>
    </section>

    <section id="view-pedidos" class="view">
      <div class="bg-white border border-slate-200 rounded-2xl p-5 mb-5">
        <h2 class="text-lg font-bold mb-3">Buscar mis pedidos</h2>
        <div class="grid grid-cols-1 md:grid-cols-[1fr_1fr_auto] gap-3">
          <input id="buscar-telefono" type="tel" placeholder="Telefono usado en el pedido" class="px-3 py-2 border border-slate-200 rounded-lg">
          <input id="buscar-email" type="email" placeholder="Email (opcional)" class="px-3 py-2 border border-slate-200 rounded-lg">
          <button onclick="Portal.buscarPedidos()" class="px-4 py-2 bg-slate-900 text-white rounded-lg">Buscar</button>
        </div>
      </div>
      <div id="mis-pedidos" class="space-y-3">
        <p class="text-slate-500 text-center py-8">Ingresa tus datos para ver pedidos recientes</p>
      </div>
    </section>
  </main>

  <button id="floating-cart" onclick="Portal.mostrar('carrito')" class="fixed bottom-6 right-6 w-16 h-16 bg-amber-600 text-white rounded-full shadow-lg flex items-center justify-center">
    <span class="text-2xl">+</span>
  </button>

  <div id="toast" class="toast fixed bottom-6 left-1/2 -translate-x-1/2 px-5 py-3 rounded-lg shadow-lg text-white bg-slate-900 z-40"></div>

  <script>
    const Portal = {
      productos: [],
      carrito: [],
      enviando: false,

      init() {
        const manana = new Date();
        manana.setDate(manana.getDate() + 1);
        const fecha = document.getElementById('fecha-entrega');
        fecha.min = manana.toISOString().split('T')[0];
        fecha.value = manana.toISOString().split('T')[0];
        this.cargarCatalogo();
        this.renderCarrito();
      },

      api(functionName, ...args) {
  return window.api(functionName, ...args);
},

      mostrar(view) {
        document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
        document.getElementById('view-' + view).classList.add('active');
        if (view === 'carrito') this.renderCarrito();
      },

      cargarCatalogo() {
        this.api('getPortalCatalogo').then(data => {
          this.productos = data || [];
          this.renderCatalogo();
        }).catch(() => {
          document.getElementById('catalogo').innerHTML = '<p class="text-red-600">No se pudo cargar la carta.</p>';
        });
      },

      renderCatalogo() {
        const q = (document.getElementById('search').value || '').toLowerCase();
        const productos = this.productos.filter(p => String(p.Nombre || '').toLowerCase().includes(q));
        const el = document.getElementById('catalogo');
        if (!productos.length) {
          el.innerHTML = '<p class="text-slate-500 col-span-full text-center py-10">No hay productos disponibles</p>';
          return;
        }

        el.innerHTML = productos.map(p => `
          <div id="card-${p.ID}" class="producto-card bg-white rounded-xl border border-slate-200 p-5 hover:shadow-sm transition">
            <h3 class="font-semibold mb-1">${this.escape(p.Nombre)}</h3>
            <p class="text-sm text-slate-500 min-h-10">${this.escape(p.Descripcion || '')}</p>
            <div class="flex justify-between items-end gap-3 mt-4">
              <div>
                <p class="text-xl font-bold text-amber-600">${this.money(p.Precio_Minorista)}</p>
                <p class="text-xs text-slate-400">Stock: ${p.Stock_Actual || 0}</p>
              </div>
              <div class="flex gap-2">
                <input id="qty-${p.ID}" type="number" min="1" value="1" class="w-16 px-2 py-2 border border-slate-200 rounded-lg text-center">
                <button onclick="Portal.agregar('${p.ID}', this)" class="px-3 py-2 bg-amber-600 text-white rounded-lg text-sm font-medium transition">Agregar</button>
              </div>
            </div>
          </div>
        `).join('');
      },

      agregar(id, button) {
        const p = this.productos.find(item => String(item.ID) === String(id));
        if (!p) return;
        const qty = Math.max(1, parseInt(document.getElementById('qty-' + id)?.value, 10) || 1);
        const existing = this.carrito.find(item => String(item.productoId) === String(id));
        if (existing) existing.cantidad += qty;
        else this.carrito.push({ productoId: p.ID, nombre: p.Nombre, precio: parseFloat(p.Precio_Minorista) || 0, cantidad: qty });
        this.renderCarrito();
        this.marcarAgregado(id, button);
        this.toast('Producto agregado', 'success');
      },

      marcarAgregado(id, button) {
        const card = document.getElementById('card-' + id);
        if (card) {
          card.classList.add('added');
          setTimeout(() => card.classList.remove('added'), 700);
        }
        if (!button) return;
        const original = button.innerHTML;
        button.disabled = true;
        button.classList.remove('bg-amber-600');
        button.classList.add('bg-emerald-600');
        button.innerHTML = 'Agregado';
        setTimeout(() => {
          button.disabled = false;
          button.classList.add('bg-amber-600');
          button.classList.remove('bg-emerald-600');
          button.innerHTML = original;
        }, 700);
      },

      cambiarCantidad(index, delta) {
        const item = this.carrito[index];
        if (!item) return;
        item.cantidad += delta;
        if (item.cantidad <= 0) this.carrito.splice(index, 1);
        this.renderCarrito();
      },

      renderCarrito() {
        const el = document.getElementById('carrito-items');
        if (!this.carrito.length) {
          el.innerHTML = '<p class="text-slate-500 text-center py-8">Todavia no agregaste productos</p>';
        } else {
          el.innerHTML = this.carrito.map((item, index) => `
            <div class="flex items-center justify-between gap-3 py-3 border-b border-slate-100">
              <div>
                <p class="font-medium">${this.escape(item.nombre)}</p>
                <p class="text-sm text-slate-500">${this.money(item.precio)} c/u</p>
              </div>
              <div class="flex items-center gap-2">
                <button onclick="Portal.cambiarCantidad(${index}, -1)" class="w-8 h-8 border border-slate-200 rounded-lg">-</button>
                <span class="w-8 text-center font-medium">${item.cantidad}</span>
                <button onclick="Portal.cambiarCantidad(${index}, 1)" class="w-8 h-8 border border-slate-200 rounded-lg">+</button>
                <span class="w-24 text-right font-semibold">${this.money(item.precio * item.cantidad)}</span>
              </div>
            </div>
          `).join('');
        }
        document.getElementById('total').textContent = this.money(this.total());
        document.getElementById('cart-count').textContent = this.carrito.reduce((sum, item) => sum + item.cantidad, 0);
      },

      enviarPedido() {
        if (this.enviando) return;
        if (!this.carrito.length) return this.toast('Agrega al menos un producto', 'error');
        const nombre = document.getElementById('cliente-nombre').value.trim();
        const telefono = document.getElementById('cliente-telefono').value.trim();
        if (!nombre || !telefono) return this.toast('Nombre y telefono son obligatorios', 'error');

        this.enviando = true;
        this.setLoading(true);
        this.api('crearPedidoPortal', {
          cliente: {
            nombre,
            telefono,
            dni: document.getElementById('cliente-dni').value.trim(),
            email: document.getElementById('cliente-email').value.trim()
          },
          fechaEntrega: document.getElementById('fecha-entrega').value,
          direccion: document.getElementById('direccion').value.trim(),
          notas: document.getElementById('notas').value.trim(),
          medioPago: document.getElementById('medio-pago').value,
          items: this.carrito.map(item => ({ productoId: item.productoId, cantidad: item.cantidad }))
        }).then(res => {
          if (!res.success) return this.resultado(res.error || 'No se pudo crear el pedido', 'error');
          this.carrito = [];
          this.renderCarrito();
          const mp = res.mpInitPoint ? `<a class="underline font-semibold" href="${res.mpInitPoint}" target="_blank" rel="noopener">Pagar con Mercado Pago</a>` : '';
          this.resultado(`Pedido recibido. Total ${this.money(res.total)}. ${mp}`, 'success');
          this.toast('Pedido enviado correctamente', 'success');
        }).catch(err => {
          this.resultado(err.message || 'Error enviando pedido', 'error');
        }).finally(() => {
          this.enviando = false;
          this.setLoading(false);
        });
      },

      buscarPedidos() {
        const telefono = document.getElementById('buscar-telefono').value.trim();
        const email = document.getElementById('buscar-email').value.trim();
        const el = document.getElementById('mis-pedidos');
        if (!telefono && !email) {
          el.innerHTML = '<p class="text-red-600 text-center py-8">Ingresa telefono o email</p>';
          return;
        }
        el.innerHTML = '<p class="text-slate-500 text-center py-8">Buscando...</p>';
        this.api('getPedidosPortal', { telefono, email }).then(pedidos => this.renderPedidos(pedidos || []));
      },

      renderPedidos(pedidos) {
        const el = document.getElementById('mis-pedidos');
        if (!pedidos.length) {
          el.innerHTML = '<p class="text-slate-500 text-center py-8">No encontramos pedidos con esos datos</p>';
          return;
        }
        el.innerHTML = pedidos.map(p => `
          <div class="bg-white border border-slate-200 rounded-xl p-4">
            <div class="flex justify-between gap-3 mb-3">
              <div>
                <p class="font-semibold">Pedido #${String(p.ID).slice(0, 8)}</p>
                <p class="text-sm text-slate-500">${this.escape(p.Fecha_Pedido || '')}</p>
                <p class="text-xs text-slate-500">${this.escape(p.Estado || '')} · ${this.escape(p.Medio_Pago || '')} · ${this.escape(p.Estado_Pago || '')}</p>
              </div>
              <p class="text-lg font-bold text-amber-600">${this.money(p.Total)}</p>
            </div>
            <div class="space-y-1">
              ${(p.items || []).map(item => `
                <div class="flex justify-between text-sm text-slate-600">
                  <span>${item.cantidad} x ${this.escape(item.nombre)}</span>
                  <span>${this.money(item.subtotal)}</span>
                </div>
              `).join('')}
            </div>
            ${p.MP_Init_Point ? `<a class="inline-block mt-3 text-sm underline font-medium" href="${p.MP_Init_Point}" target="_blank" rel="noopener">Link de pago</a>` : ''}
          </div>
        `).join('');
      },

      total() {
        return this.carrito.reduce((sum, item) => sum + item.precio * item.cantidad, 0);
      },

      money(value) {
        return '$' + ((parseFloat(value) || 0).toLocaleString('es-AR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }));
      },

      escape(value) {
        return String(value || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#039;');
      },

      setLoading(on) {
        const btn = document.getElementById('btn-enviar');
        btn.disabled = on;
        btn.innerHTML = on ? '<span class="btn-spinner"></span>Enviando...' : 'Enviar';
      },

      resultado(msg, type) {
        const el = document.getElementById('resultado');
        el.className = 'mt-4 text-sm ' + (type === 'success' ? 'text-emerald-700' : 'text-red-600');
        el.innerHTML = msg;
      },

      toast(msg, type) {
        const el = document.getElementById('toast');
        el.textContent = msg;
        el.className = 'toast active fixed bottom-6 left-1/2 -translate-x-1/2 px-5 py-3 rounded-lg shadow-lg text-white z-40 ' + (type === 'error' ? 'bg-red-600' : type === 'success' ? 'bg-emerald-600' : 'bg-slate-900');
        setTimeout(() => el.classList.remove('active'), 2600);
      }
    };

    document.addEventListener('DOMContentLoaded', () => Portal.init());
  </script>
</body>
</html>
