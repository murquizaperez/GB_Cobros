<!DOCTYPE html>
<html lang="es"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monnoserie · Sistema de gestión</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5.1.1/dist/tesseract.min.js"></script>
<style>
:root{
  --violeta:#5453A3; --violeta-vivo:#6346BA; --violeta-osc:#3F3E7A;
  --crema:#F4F1EA; --tinta:#1A1A22; --blanco:#FFFFFF;
  --wa:#25D366; --wa-osc:#128C7E;
  --ok:#2e9e5b; --warn:#c9821a; --err:#c2453f;
  --sidebar:#2a2942; --sidebar-2:#1f1e33;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Poppins',system-ui,sans-serif;font-weight:300;background:var(--crema);color:var(--tinta)}
h1,h2,h3,.fred{font-family:'Fredoka',sans-serif}
/* === Tipografía: SOLO los títulos en negrita; números y texto finos === */
body,p,span,div,td,th,li,a,label,input,select,button,b,strong,
.val,.total,.prc,.stk,.tel,.cli,.pid,.meta,.badge,.sub,.lbl,
.stock-input,.precio-input,.toggle,.filtro,.pos-total,.pcard .prc,
.kpi .val,.kpi .lbl,.money{font-weight:300!important}
h1,h2,h3,h4,.fred,.sec-tit,.sb-head .t{font-weight:600!important}

/* LOGIN */
.login{max-width:360px;margin:8vh auto;background:#fff;padding:2rem;border-radius:18px;box-shadow:0 8px 30px rgba(63,62,122,.15);text-align:center}
.login img{height:70px;margin-bottom:1rem}
.login input{width:100%;padding:.7rem;border:2px solid var(--violeta);border-radius:10px;font-size:1rem;text-align:center;margin:1rem 0;font-family:'Fredoka'}
.login button{width:100%;background:var(--violeta);color:#fff;border:none;padding:.7rem;border-radius:10px;font-family:'Fredoka';font-weight:600;font-size:1rem;cursor:pointer}

/* LAYOUT */
.app{display:flex;min-height:100vh}
.sidebar{width:248px;background:linear-gradient(180deg,var(--sidebar),var(--sidebar-2));color:#fff;flex-shrink:0;
  display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto}
.sb-head{padding:1.1rem 1.2rem;display:flex;align-items:center;gap:.6rem;border-bottom:1px solid rgba(255,255,255,.08)}
.sb-head img{height:38px}
.sb-head .t{font-family:'Fredoka';font-weight:600;font-size:1.05rem;line-height:1}
.sb-head .s{font-size:.62rem;opacity:.6;letter-spacing:1px;text-transform:uppercase}
.sb-group{padding:.5rem 0}
.sb-label{font-size:.62rem;letter-spacing:1.5px;text-transform:uppercase;opacity:.45;padding:.6rem 1.4rem .3rem;font-weight:600}
.sb-item{display:flex;align-items:center;gap:.7rem;padding:.6rem 1.4rem;cursor:pointer;font-size:.9rem;color:rgba(255,255,255,.82);border:none;background:none;width:100%;text-align:left;font-family:'Poppins';transition:.12s}
.sb-item:hover{background:rgba(255,255,255,.06);color:#fff}
.sb-item.activo{background:var(--violeta-vivo);color:#fff;font-weight:500}
.sb-item .ic{font-size:1.05rem;width:20px;text-align:center}
.sb-foot{margin-top:auto;padding:1rem 1.4rem;border-top:1px solid rgba(255,255,255,.08);font-size:.7rem;opacity:.5}

.main{flex:1;min-width:0;display:flex;flex-direction:column}
.topbar{background:#fff;border-bottom:1px solid #e8e4dc;padding:1rem 1.5rem;display:flex;align-items:center;gap:1rem;position:sticky;top:0;z-index:20}
.topbar h1{font-size:1.4rem;color:var(--violeta-osc)}
.topbar .sp{margin-left:auto}
.btn{font-family:'Fredoka';font-weight:500;border:none;border-radius:10px;padding:.5rem .9rem;cursor:pointer;font-size:.85rem;transition:.15s;display:inline-flex;align-items:center;gap:.35rem;white-space:nowrap}
.btn:active{transform:translateY(1px)}
.btn-violeta{background:var(--violeta);color:#fff}
.btn-violeta:hover{background:var(--violeta-osc)}
.btn-ghost{background:#fff;color:var(--violeta);border:2px solid var(--violeta)}
.btn-ghost:hover{background:var(--violeta);color:#fff}
.btn-wa{background:var(--wa);color:#fff}
.btn-wa:hover{background:var(--wa-osc)}
.btn-pago{background:var(--ok);color:#fff}
.btn-estado{background:var(--violeta-vivo);color:#fff}
.btn-sm{padding:.3rem .6rem;font-size:.78rem;border-radius:8px}

.content{padding:1.5rem;flex:1;background:var(--crema);
  background-image:radial-gradient(circle at 1px 1px, rgba(84,83,163,.05) 1px, transparent 0);background-size:22px 22px}
.seccion{display:none}
.seccion.activa{display:block}

/* KPI CARDS */
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:1rem;margin-bottom:1.3rem}
.kpi{background:#fff;border-radius:14px;padding:1.1rem 1.2rem;box-shadow:0 2px 10px rgba(63,62,122,.07);border:1px solid rgba(84,83,163,.1)}
.kpi .lbl{font-size:.8rem;color:#888;margin-bottom:.3rem}
.kpi .val{font-family:'Fredoka';font-weight:600;font-size:1.7rem;color:var(--violeta-osc);line-height:1}
.kpi .sub{font-size:.74rem;color:#aaa;margin-top:.3rem}
.kpi.verde .val{color:var(--ok)}
.kpi.naranja .val{color:var(--warn)}

.panel{background:#fff;border-radius:14px;padding:1.2rem;box-shadow:0 2px 10px rgba(63,62,122,.07);border:1px solid rgba(84,83,163,.1);margin-bottom:1.2rem}
.panel h2{font-size:1.1rem;color:var(--violeta-osc);margin-bottom:.8rem}
.dos-col{display:grid;grid-template-columns:1fr 1fr;gap:1.2rem}
@media(max-width:800px){.dos-col{grid-template-columns:1fr}}
.accesos{display:grid;grid-template-columns:1fr 1fr;gap:.8rem}
.acceso{display:flex;flex-direction:column;align-items:flex-start;gap:.2rem;text-align:left;background:var(--crema);border:1px solid rgba(84,83,163,.12);border-radius:12px;padding:.9rem 1rem;cursor:pointer;transition:.15s;font-family:'Poppins',sans-serif}
.acceso:hover{background:#fff;border-color:var(--violeta);box-shadow:0 2px 10px rgba(63,62,122,.1);transform:translateY(-1px)}
.acceso b{font-family:'Fredoka',sans-serif;font-weight:600;color:var(--violeta-osc);font-size:1.02rem}
.acceso span{font-size:.78rem;color:#999}
@media(max-width:480px){.accesos{grid-template-columns:1fr}}
.chip{display:inline-block;padding:.2rem .6rem;border-radius:999px;font-size:.74rem;font-weight:600}

/* TABLA PRODUCTOS */
.tabla{width:100%;border-collapse:collapse;font-size:.88rem}
.tabla th{text-align:left;padding:.6rem .5rem;border-bottom:2px solid #eee;color:#888;font-weight:600;font-size:.76rem;text-transform:uppercase;letter-spacing:.4px}
.tabla td{padding:.55rem .5rem;border-bottom:1px solid #f0ede7;vertical-align:middle}
.tabla tr:hover td{background:#faf8f4}
.stock-pill{display:inline-flex;align-items:center;gap:.3rem}
.stock-input{width:64px;padding:.3rem;border:1px solid #ddd;border-radius:6px;text-align:center;font-family:'Fredoka'}
.precio-input{width:90px;padding:.3rem;border:1px solid #ddd;border-radius:6px;text-align:right;font-family:'Fredoka'}
.toggle{cursor:pointer;font-size:.74rem;padding:.2rem .6rem;border-radius:999px;font-family:'Fredoka';font-weight:600;border:none}
.toggle.on{background:#e3f6ea;color:#1f7d44}
.toggle.off{background:#fde8e6;color:#b13a34}

/* PEDIDOS (reusa el diseño anterior) */
.bar{display:flex;flex-wrap:wrap;gap:.5rem;align-items:center;margin-bottom:1rem}
.filtro{font-family:'Fredoka';font-size:.85rem;border:2px solid var(--violeta);background:#fff;color:var(--violeta);padding:.35rem .85rem;border-radius:999px;cursor:pointer;font-weight:500}
.filtro:hover,.filtro.activo{background:var(--violeta);color:#fff}
.card{background:#fff;border-radius:14px;padding:1rem 1.1rem;margin-bottom:1rem;box-shadow:0 2px 10px rgba(63,62,122,.07);border:1px solid rgba(84,83,163,.1)}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;flex-wrap:wrap}
.pid{font-family:'Fredoka';font-weight:600;font-size:1.1rem;color:var(--violeta-osc)}
.cli{font-weight:600}
.tel{font-size:.82rem;color:#666}
.total{font-family:'Fredoka';font-weight:600;font-size:1.2rem;color:var(--violeta-vivo);text-align:right}
.badge{display:inline-block;font-size:.68rem;font-weight:600;padding:.16rem .55rem;border-radius:999px;text-transform:uppercase;letter-spacing:.4px;font-family:'Fredoka'}
.b-pendiente{background:#fff3e0;color:#b26a00}.b-en_preparacion{background:#ede7ff;color:#5e3bb5}
.b-listo{background:#e3f6ea;color:#1f7d44}.b-entregado{background:#eceff1;color:#555}.b-cancelado{background:#fde8e6;color:#b13a34}
.pago-ok{background:#e3f6ea;color:#1f7d44}.pago-pend{background:#fff3e0;color:#b26a00}
.items{margin:.5rem 0;font-size:.84rem;color:#555;line-height:1.5}.items b{color:var(--tinta)}
.acciones{display:flex;flex-wrap:wrap;gap:.4rem;margin-top:.7rem;padding-top:.7rem;border-top:1px dashed rgba(84,83,163,.2)}
.meta{font-size:.76rem;color:#888;margin-top:.3rem}
.factura{margin-top:.5rem;font-size:.76rem;padding:.4rem .6rem;border-radius:8px;background:#f6f4ef}
.factura.okf{border-left:3px solid var(--ok)}.factura.errf{border-left:3px solid var(--err);color:#a33}

.vacio{text-align:center;color:#999;padding:3rem 1rem;font-family:'Fredoka';font-size:1.05rem}
.spin{text-align:center;padding:3rem;color:var(--violeta);font-family:'Fredoka'}
.proximamente{text-align:center;padding:4rem 1rem;color:#aaa}
.proximamente .big{font-size:3rem;margin-bottom:.5rem}
.proximamente .fase{display:inline-block;margin-top:1rem;background:var(--violeta);color:#fff;padding:.3rem .9rem;border-radius:999px;font-family:'Fredoka';font-size:.8rem}
.toast{position:fixed;bottom:1.25rem;left:50%;transform:translateX(-50%);background:var(--tinta);color:#fff;padding:.7rem 1.2rem;border-radius:999px;font-size:.9rem;font-family:'Fredoka';z-index:50;opacity:0;transition:.3s;pointer-events:none}
.toast.show{opacity:1}.toast.ok{background:var(--ok)}.toast.err{background:var(--err)}

.mobile-menu{display:none}
@media(max-width:760px){
  .sidebar{position:fixed;left:-248px;z-index:40;transition:.25s}
  .sidebar.abierto{left:0}
  .mobile-menu{display:inline-flex}
}

/* POS */
.pos-layout{display:grid;grid-template-columns:1fr 340px;gap:1.2rem;align-items:start}
@media(max-width:900px){.pos-layout{grid-template-columns:1fr}}
.pos-buscar{width:100%;padding:.7rem 1rem;border:2px solid #e6e2d9;border-radius:12px;font-family:'Poppins';font-size:.95rem;margin-bottom:1rem}
.pos-buscar:focus{outline:none;border-color:var(--violeta)}
.pos-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:.8rem}
.pcard{background:#fff;border-radius:14px;overflow:hidden;box-shadow:0 2px 10px rgba(63,62,122,.07);border:1px solid rgba(84,83,163,.1);display:flex;flex-direction:column}
.pcard .img{height:90px;background:linear-gradient(135deg,#ede9ff,#f4f1ea);display:flex;align-items:center;justify-content:center;font-size:1.8rem;background-size:cover;background-position:center}
.pcard .body{padding:.6rem .7rem;flex:1;display:flex;flex-direction:column}
.pcard .nom{font-weight:600;font-size:.85rem;line-height:1.2;margin-bottom:.2rem}
.pcard .stk{font-size:.7rem;color:#999;margin-bottom:.2rem}
.pcard .prc{font-family:'Fredoka';font-weight:600;color:var(--ok);font-size:1.05rem;margin-bottom:.4rem}
.pcard .btns{display:flex;gap:.25rem;margin-top:auto}
.pcard .btns button{flex:1;border:1px solid var(--violeta);background:#fff;color:var(--violeta);border-radius:7px;padding:.3rem 0;font-family:'Fredoka';font-weight:600;font-size:.78rem;cursor:pointer}
.pcard .btns button:hover{background:var(--violeta);color:#fff}
.pos-venta{background:#fff;border-radius:14px;padding:1.1rem;box-shadow:0 2px 10px rgba(63,62,122,.07);border:1px solid rgba(84,83,163,.1);position:sticky;top:5rem}
.pos-venta h2{font-size:1.05rem;color:var(--violeta-osc);margin-bottom:.7rem}
.pos-venta input,.pos-venta select{width:100%;padding:.5rem .7rem;border:1px solid #ddd;border-radius:8px;font-family:'Poppins';font-size:.88rem;margin-bottom:.5rem}
.pos-carrito{margin:.6rem 0;max-height:260px;overflow-y:auto}
.pos-linea{display:flex;align-items:center;gap:.4rem;padding:.35rem 0;border-bottom:1px solid #f0ede7;font-size:.84rem}
.pos-linea .x{cursor:pointer;color:var(--err);font-weight:700;padding:0 .3rem}
.pos-linea .nm{flex:1}
.pos-total{font-family:'Fredoka';font-weight:600;font-size:1.4rem;color:var(--violeta-vivo);text-align:right;margin:.6rem 0}
.pos-cobrar{width:100%;background:var(--ok);color:#fff;border:none;border-radius:10px;padding:.8rem;font-family:'Fredoka';font-weight:600;font-size:1.05rem;cursor:pointer}
.pos-cobrar:hover{filter:brightness(1.07)}
.pos-cobrar:disabled{background:#ccc;cursor:not-allowed}
.aviso{background:#fff3e0;color:#b26a00;padding:1rem 1.2rem;border-radius:12px;margin-bottom:1rem;font-size:.9rem;border-left:4px solid var(--warn)}
.caja-form{max-width:420px}
.caja-form label{display:block;font-size:.85rem;color:#666;margin:.6rem 0 .2rem}
.caja-form input{width:100%;padding:.6rem;border:1px solid #ddd;border-radius:8px;font-family:'Fredoka'}
</style>
</head><body>

        <div id="pos-aviso"></div>
        <div class="pos-layout" id="pos-layout">
          <div class="pos-productos">
            <div class="bar" id="pos-orden-ctrl" style="font-size:.85rem;color:#888;align-items:center"></div>
            <input class="pos-buscar" id="pos-buscar" placeholder="🔍 Buscar producto..." oninput="App.filtrarPOS(this.value)">
            <div class="pos-grid" id="pos-grid"></div>
          </div>
          <div class="pos-venta">
            <h2>🛒 Venta actual</h2>
            <input id="pos-cliente" placeholder="Cliente (opcional)">
            <select id="pos-medio">
              <option value="Efectivo">Efectivo</option>
              <option value="Transferencia">Transferencia</option>
              <option value="Mercado Pago">Mercado Pago</option>
              <option value="Tarjeta">Tarjeta</option>

            <label style="display:flex;align-items:center;gap:.4rem;font-size:.85rem;margin-bottom:.5rem;cursor:pointer">
              <input type="checkbox" id="pos-factura" style="width:auto;margin:0" onchange="document.getElementById('pos-cuit-wrap').style.display=this.checked?'block':'none'">

      <div class="seccion" id="sec-planning"><div id="plan-body"></div></div>
      <div class="seccion" id="sec-mayorista"><div id="may-body"></div></div>
      <div class="seccion" id="sec-promos"><div id="promos-body"></div></div>
      <div class="seccion" id="sec-cuentacorriente"><div id="cc-body"></div></div>
      <div class="seccion" id="sec-documentos"><div id="doc-body"></div></div>
      <div class="seccion" id="sec-reportes"><div id="rep-body"></div></div>
      <div class="seccion" id="sec-usuarios"><div id="usr-body"></div></div>

</div>
  </div>
</div>

<div id="modal-bg" style="display:none;position:fixed;inset:0;background:rgba(26,26,34,.55);z-index:60;align-items:center;justify-content:center;padding:1rem" onclick="if(event.target===this)App.cerrarModal()">
  <div style="background:#fff;border-radius:16px;max-width:520px;width:100%;max-height:85vh;overflow-y:auto;box-shadow:0 10px 40px rgba(0,0,0,.3)">
    <div style="padding:1rem 1.3rem;border-bottom:1px solid #eee;display:flex;align-items:center">
      <h2 id="modal-titulo" class="fred" style="color:var(--violeta-osc);font-size:1.15rem;margin:0"></h2>
      <button onclick="App.cerrarModal()" style="margin-left:auto;background:none;border:none;font-size:1.5rem;cursor:pointer;color:#999;line-height:1">×</button>
    </div>
    <div id="modal-body" style="padding:1.3rem"></div>
  </div>
</div>
<div id="toast" class="toast"></div>
<script>
const API = '/api';
const SIGUIENTE = { en_preparacion:'listo', listo:'entregado' };
const LABEL_ESTADO = { pendiente:'Pendiente', en_preparacion:'En preparación', listo:'Listo', entregado:'Entregado', cancelado:'Cancelado' };
const ESTADOS_FILTRO = [{k:'',t:'Todos'},{k:'pendiente',t:'Pendientes'},{k:'en_preparacion',t:'En preparación'},{k:'listo',t:'Listos'},{k:'entregado',t:'Entregados'}];

const App = {
  token:'', seccion:'dashboard', filtro:'', pedidos:[], productos:[],

  rol:'', usuario:'',
  ROLES:{ 'dueño':['dashboard','productos','ingredientes','compras','produccion','planning','pos','caja','reportes','pedidos','mayorista','promos','cuentacorriente','documentos','usuarios','configuracion'], 'cajero':['pos','caja','pedidos'] },
  async entrar(){
    const pin=document.getElementById('pin').value.trim();
    if(!pin){this.toast('Ingresá tu PIN','err');return;}
    try{
      const r=await fetch(API+'/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({pin})});
      const d=await r.json();
      if(!d.success){this.toast(d.error||'PIN incorrecto','err');document.getElementById('pin').value='';return;}
      this.token=d.token; this.rol=d.usuario.rol; this.usuario=d.usuario.nombre;
      try{localStorage.setItem('monno_sesion',JSON.stringify({token:this.token,rol:this.rol,usuario:this.usuario}));}catch(e){}
      this.iniciarApp();
    }catch(e){this.toast('Error: '+e.message,'err');}
  },
  init(){
    let s=null;try{s=JSON.parse(localStorage.getItem('monno_sesion')||'null');}catch(e){}
    if(s&&s.token){this.token=s.token;this.rol=s.rol;this.usuario=s.usuario;this.iniciarApp();}
  },
  iniciarApp(){
    document.getElementById('login').style.display='none';
    document.getElementById('app').style.display='flex';
    document.getElementById('topbar-user').textContent='👤 '+this.usuario+' · '+this.rol;
    // Filtrar secciones según rol
    const permitidas=this.ROLES[this.rol]||this.ROLES['cajero'];
    document.querySelectorAll('.sb-item').forEach(b=>{
      const sec=b.dataset.sec;
      b.style.display=(sec&&permitidas.includes(sec))?'flex':'none';
    });
    document.querySelectorAll('.sb-group[data-rol]').forEach(g=>{
      g.style.display=(g.dataset.rol===this.rol)?'block':'none';
    });
    this.ir(permitidas[0]||'pos');
  },
  salir(msg){
    try{localStorage.removeItem('monno_sesion');}catch(e){}
    this.token='';this.rol='';this.usuario='';
    document.getElementById('app').style.display='none';document.getElementById('login').style.display='block';
    document.getElementById('pin').value='';
    if(msg)this.toast(msg,'err');
  },
  puede(sec){return (this.ROLES[this.rol]||[]).includes(sec);},
  headers(){return {'Content-Type':'application/json','x-admin-token':this.token};},
  money(n){return '$'+Number(n||0).toLocaleString('es-AR');},

  ir(sec){
    this.seccion=sec;
    document.querySelectorAll('.seccion').forEach(s=>s.classList.remove('activa'));
    document.getElementById('sec-'+sec).classList.add('activa');
    document.querySelectorAll('.sb-item').forEach(b=>b.classList.toggle('activo',b.dataset.sec===sec));
    document.getElementById('titulo').textContent=({dashboard:'Dashboard',productos:'Productos y Stock',pedidos:'Pedidos',pos:'Punto de Venta',caja:'Caja',ingredientes:'Ingredientes',compras:'Almacén / Compras',produccion:'Producción y Lotes',reportes:'Reportes',estrategias:'Análisis y Estrategias',configuracion:'Configuración'})[sec]||sec;
    document.getElementById('sidebar').classList.remove('abierto');
    if(sec==='dashboard')this.cargarDashboard();
    if(sec==='productos')this.cargarProductos();
    if(sec==='pedidos'){this.renderFiltros();this.cargarPedidos();}
    if(sec==='pos')this.cargarPOS();
    if(sec==='caja')this.cargarCaja();
    if(sec==='ingredientes')this.cargarIngredientes();
    if(sec==='produccion')this.cargarProduccion();
    if(sec==='reportes')this.cargarReportes();
    if(sec==='usuarios')this.cargarUsuarios();
    if(sec==='planning')this.cargarPlanning();
    if(sec==='mayorista')this.cargarMayoristas();
    if(sec==='promos')this.cargarPromos();
    if(sec==='cuentacorriente')this.cargarCuentaCorriente();
    if(sec==='documentos')this.cargarDocumentos();
    if(sec==='configuracion')this.cargarConfig();
    if(sec==='compras')this.cargarCompras();
    if(sec==='estrategias')this.cargarEstrategias();
  },
  toggleMenu(){document.getElementById('sidebar').classList.toggle('abierto');},

  // ---------- DASHBOARD ----------
  async cargarDashboard(){
    const el=document.getElementById('dash-body');
    el.innerHTML='<div class="spin">Cargando…</div>';
    try{
      const [r,ri]=await Promise.all([
        fetch(API+'/dashboard?token='+encodeURIComponent(this.token),{headers:this.headers()}),
        fetch(API+'/listar-ingredientes?token='+encodeURIComponent(this.token),{headers:this.headers()})
      ]);
      if(r.status===401){this.salir('Clave incorrecta');return;}
      const d=await r.json();
      if(!d.success)throw new Error(d.error||'Error');
      const ings=((await ri.json()).ingredientes)||[];
      const bajoMin=ings.filter(i=>i.bajo);
      this.setNavAlertBadge(bajoMin.length);
      const alertaMin=bajoMin.length
        ? bajoMin.map(i=>`<tr><td><b>${i.nombre}</b></td><td style="text-align:right;color:var(--err);font-weight:600">${i.stock} ${i.unidad||''}</td><td style="text-align:right;color:#888">mín ${i.stockMinimo}</td><td style="text-align:right"><button class="btn btn-sm btn-violeta" onclick="App.reponerIngrediente(${i.id})">🛒 Reponer</button></td></tr>`).join('')
        : '<tr><td colspan="4" style="color:#aaa;text-align:center;padding:.6rem">Todo por encima del mínimo 👍</td></tr>';
      el.innerHTML=`
        <div class="kpis">
          <div class="kpi verde"><div class="lbl">Ventas hoy</div><div class="val">${this.money(d.ventasHoy)}</div><div class="sub">${d.txHoy} transacciones</div></div>
          <div class="kpi"><div class="lbl">Ventas semana</div><div class="val">${this.money(d.ventasSemana)}</div></div>
          <div class="kpi naranja"><div class="lbl">Pedidos pendientes</div><div class="val">${d.pedidosPendientes}</div></div>
          <div class="kpi"><div class="lbl">Estado caja</div><div class="val" style="color:${d.caja.abierta?'var(--ok)':'#999'}">${d.caja.abierta?'Abierta':'Cerrada'}</div><div class="sub">${d.caja.abierta?(d.caja.responsable||'—'):'sin turno activo'}</div></div>
        </div>
        <div class="dos-col">
          <div class="panel">
            <h2>Estadísticas</h2>
            <table class="tabla">
              <tr><td>Total Productos</td><td style="text-align:right;font-weight:600">${d.totalProductos}</td></tr>
              <tr><td>Total Ingredientes</td><td style="text-align:right;font-weight:600">${d.totalIngredientes}</td></tr>
              <tr><td>Clientes</td><td style="text-align:right;font-weight:600">${d.totalClientes}</td></tr>
              <tr><td>Ventas Mes</td><td style="text-align:right;font-weight:600">${this.money(d.ventasMes)}</td></tr>
            </table>
          </div>
          <div class="panel">
            <h2>Accesos rápidos</h2>
            <div class="accesos">
              <button class="acceso" onclick="App.ir('produccion')"><b>Producción</b><span>Manejo de lotes</span></button>
              <button class="acceso" onclick="App.ir('ingredientes')"><b>Ingredientes</b><span>Gestionar materia prima</span></button>
              <button class="acceso" onclick="App.ir('caja')"><b>Caja</b><span>Abrir/cerrar caja</span></button>
              <button class="acceso" onclick="App.ir('pos')"><b>Punto de Venta</b><span>Registrar ventas</span></button>
            </div>
          </div>
        </div>
        <div class="panel">
          <h2>⚠️ Alertas de stock mínimo ${bajoMin.length?'<span class="chip" style="background:#fde8e6;color:#b13a34">'+bajoMin.length+'</span>':''}</h2>
          <p style="font-size:.8rem;color:#888;margin:-.3rem 0 .5rem">Ingredientes en o por debajo de su mínimo configurado. "Reponer" abre una orden de compra.</p>
          <table class="tabla"><tbody>${alertaMin}</tbody></table>
        </div>`;
    }catch(e){el.innerHTML='<div class="vacio">No se pudo cargar el dashboard.<br><small>'+e.message+'</small></div>';}
  },
  setNavAlertBadge(n){
    const b=document.getElementById('nav-alert-badge');if(!b)return;
    if(n>0){b.textContent=n;b.style.display='inline-block';}else{b.style.display='none';}
  },
  async reponerIngrediente(id){
    this.ir('compras');
    if(!this._ocIngs || !this._ocIngs.length){
      try{
        const r=await fetch(API+'/listar-ingredientes?token='+encodeURIComponent(this.token),{headers:this.headers()});
        this._ocIngs=((await r.json()).ingredientes)||[];
      }catch(e){this._ocIngs=this._ocIngs||[];}
    }
    this.nuevaOrdenCompra();
    const sel=document.getElementById('oc-ing');if(sel)sel.value=String(id);
    const ing=(this._ocIngs||[]).find(i=>i.id===id);
    if(ing){
      const s=Number(ing.stock)||0, m=Number(ing.stockMinimo)||0;
      const sugerido=Math.round(Math.max(m, 2*m - s)*100)/100;  // reponer hasta ~2× el mínimo
      const cant=document.getElementById('oc-cant');if(cant&&sugerido>0)cant.value=sugerido;
      const costo=document.getElementById('oc-costo');if(costo&&Number(ing.costo)>0)costo.value=ing.costo;
    }
    const c=document.getElementById('oc-cant');if(c)c.focus();
  },

  // ---------- PRODUCTOS ----------
  async cargarProductos(){
    const el=document.getElementById('prod-body');
    el.innerHTML='<div class="spin">Cargando productos…</div>';
    try{
      const r=await fetch(API+'/listar-productos?token='+encodeURIComponent(this.token),{headers:this.headers()});
      if(r.status===401){this.salir('Clave incorrecta');return;}
      const d=await r.json();
      if(!d.success)throw new Error(d.error||'Error');
      this.productos=d.productos||[];
      this.renderProductos();
    }catch(e){el.innerHTML='<div class="vacio">No se pudieron cargar.<br><small>'+e.message+'</small></div>';}
  },
  renderProductos(){
    const filas=this.productos.map(p=>`
      <tr>
        <td><div style="display:flex;align-items:center;gap:.6rem">
          <div onclick="document.getElementById('foto-${p.id}').click()" title="Subir foto" style="width:42px;height:42px;border-radius:8px;background:#ece8df ${p.imagen?`center/cover url('${p.imagen}')`:''};display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;font-size:1.1rem">${p.imagen?'':'📷'}</div>
          <input type="file" id="foto-${p.id}" accept="image/*" style="display:none" onchange="App.subirFotoProd(${p.id},this)">
          <div><b>${p.nombre}</b><div style="font-size:.72rem;color:#aaa">${p.sku}</div></div>
        </div></td>
        <td><div class="stock-pill">
          <button class="btn btn-sm btn-ghost" onclick="App.ajustarStock(${p.id},-1)">−</button>
          <input class="stock-input" id="stk-${p.id}" value="${p.stock}" onchange="App.setStock(${p.id},this.value)">
          <button class="btn btn-sm btn-ghost" onclick="App.ajustarStock(${p.id},1)">+</button>
        </div></td>
        <td><input class="precio-input" id="pmin-${p.id}" value="${p.precioMinorista}" onchange="App.editarPrecio(${p.id})"></td>
        <td><input class="precio-input" id="pmay-${p.id}" value="${p.precioMayorista}" onchange="App.editarPrecio(${p.id})"></td>
        <td><button class="toggle ${p.activo?'on':'off'}" onclick="App.toggleActivo(${p.id},${!p.activo})">${p.activo?'Visible':'Oculto'}</button></td>
      </tr>`).join('');
    document.getElementById('prod-body').innerHTML=`
      <div class="panel">
        <div style="display:flex;align-items:center;margin-bottom:.8rem">
          <h2 style="margin:0">Catálogo (${this.productos.length})</h2>
          <button class="btn btn-violeta" style="margin-left:auto" onclick="App.nuevoProducto()">+ Nuevo producto</button>
        </div>
        <div style="overflow-x:auto">
        <table class="tabla">
          <thead><tr><th>Producto</th><th>Stock</th><th>P. Minorista</th><th>P. Mayorista</th><th>Portal</th></tr></thead>
          <tbody>${filas}</tbody>
        </table></div>
        <p style="font-size:.76rem;color:#aaa;margin-top:.8rem">Tocá la 📷 para subir la foto del producto (aparece en el portal). El stock y los precios se guardan al cambiarlos.</p>
      </div>`;
  },
  async subirFotoProd(id,input){
    const f=input.files[0]; if(!f)return;
    this.toast('Subiendo foto…','ok');
    try{
      const b64=await this.fileABase64(f);
      const r=await fetch(API+'/subir-archivo',{method:'POST',headers:this.headers(),body:JSON.stringify({carpeta:'productos',nombre:'prod'+id,contenidoBase64:b64,tipo:f.type,token:this.token})});
      const d=await r.json();
      if(!d.success){this.toast('Error: '+(d.error||'no se pudo'),'err');return;}
      const r2=await fetch(API+'/gestionar-producto',{method:'POST',headers:this.headers(),body:JSON.stringify({accion:'editar',id,imagen:d.url,token:this.token})});
      const d2=await r2.json();
      if(d2.success){this.toast('✓ Foto actualizada','ok');this.cargarProductos();}
      else this.toast('Error al guardar la foto','err');
    }catch(e){this.toast('Error: '+e.message,'err');}
  },
  async ajustarStock(id,delta){
    try{
      const r=await fetch(API+'/gestionar-producto',{method:'POST',headers:this.headers(),body:JSON.stringify({accion:'ajustar_stock',id,delta,token:this.token})});
      const d=await r.json();
      if(d.success){document.getElementById('stk-'+id).value=d.stock;const p=this.productos.find(x=>x.id===id);if(p)p.stock=d.stock;this.toast('Stock: '+d.stock,'ok');}
      else this.toast(d.error||'Error','err');
    }catch(e){this.toast(e.message,'err');}
  },
  async setStock(id,val){
    try{
      const r=await fetch(API+'/gestionar-producto',{method:'POST',headers:this.headers(),body:JSON.stringify({accion:'set_stock',id,stock:Number(val)||0,token:this.token})});
      const d=await r.json();
      if(d.success){this.toast('Stock actualizado','ok');const p=this.productos.find(x=>x.id===id);if(p)p.stock=d.stock;}
      else this.toast(d.error||'Error','err');
    }catch(e){this.toast(e.message,'err');}
  },
  async editarPrecio(id){
    const min=Number(document.getElementById('pmin-'+id).value)||0;
    const may=Number(document.getElementById('pmay-'+id).value)||0;
    try{
      const r=await fetch(API+'/gestionar-producto',{method:'POST',headers:this.headers(),body:JSON.stringify({accion:'editar',id,precioMinorista:min,precioMayorista:may,token:this.token})});
      const d=await r.json();
      if(d.success)this.toast('Precio actualizado','ok');else this.toast(d.error||'Error','err');
    }catch(e){this.toast(e.message,'err');}
  },
  async toggleActivo(id,nuevo){
    try{
      const r=await fetch(API+'/gestionar-producto',{method:'POST',headers:this.headers(),body:JSON.stringify({accion:'editar',id,activo:nuevo,token:this.token})});
      const d=await r.json();
      if(d.success){const p=this.productos.find(x=>x.id===id);if(p)p.activo=nuevo;this.renderProductos();this.toast(nuevo?'Visible en el portal':'Oculto del portal','ok');}
      else this.toast(d.error||'Error','err');
    }catch(e){this.toast(e.message,'err');}
  },
  async nuevoProducto(){
    const nombre=prompt('Nombre del producto:');if(!nombre)return;
    const precio=prompt('Precio minorista:','0');
    try{
      const r=await fetch(API+'/gestionar-producto',{method:'POST',headers:this.headers(),body:JSON.stringify({accion:'crear',nombre,precioMinorista:Number(precio)||0,activo:true,token:this.token})});
      const d=await r.json();
      if(d.success){this.invalidarCache();this.toast('Producto creado','ok');this.cargarProductos();}else this.toast(d.error||'Error','err');
    }catch(e){this.toast(e.message,'err');}
  },

  // ---------- PEDIDOS ----------
  renderFiltros(){
    document.getElementById('ped-filtros').innerHTML=ESTADOS_FILTRO.map(f=>`<button class="filtro ${f.k===this.filtro?'activo':''}" onclick="App.setFiltro('${f.k}')">${f.t}</button>`).join('');
  },
  setFiltro(k){this.filtro=k;this.renderFiltros();this.cargarPedidos();},
  async cargarPedidos(){
    const el=document.getElementById('ped-body');
    el.innerHTML='<div class="spin">Cargando pedidos…</div>';
    try{
      const url=API+'/listar-pedidos?token='+encodeURIComponent(this.token)+(this.filtro?'&estado='+this.filtro:'');
      const r=await fetch(url,{headers:this.headers()});
      if(r.status===401){this.salir('Clave incorrecta');return;}
      const d=await r.json();
      if(!d.success)throw new Error(d.error||'Error');
      this.pedidos=d.pedidos||[];this.renderPedidos();
    }catch(e){el.innerHTML='<div class="vacio">No se pudieron cargar.<br><small>'+e.message+'</small></div>';}
  },
  waPhone(tel){let s=String(tel||'').replace(/\D/g,'');if(!s)return '';if(s.startsWith('549'))return s;if(s.startsWith('54'))return '549'+s.slice(2);if(s.startsWith('0'))s=s.slice(1);return '549'+s;},
  mensaje(p,tipo){
    const n=(p.cliente&&p.cliente.nombre)?p.cliente.nombre.split(' ')[0]:'';const hola='Hola '+n+'! ';
    if(tipo==='recibido')return hola+'🐵 Recibimos tu pedido #'+p.id+' en Monnoserie. Total: '+this.money(p.total)+'. Te avisamos apenas esté listo. ¡Gracias!';
    if(tipo==='pagado')return hola+'Confirmamos el pago de tu pedido #'+p.id+' ✅ Ya lo estamos preparando 🥐';
    if(tipo==='listo')return hola+'Tu pedido #'+p.id+' ya está listo para retirar 🎉 Te esperamos en Monnoserie 🐵';
    if(tipo==='entregado')return hola+'¡Gracias por tu compra en Monnoserie! 🥐 ¡Volvé pronto! 🐵';

        ${factura}
        ${p.estadoPago==='pagado'&&p.comprobanteUrl?`<div class="meta">📎 <a href="${p.comprobanteUrl}" target="_blank" style="color:var(--violeta-vivo)">Ver comprobante de pago</a></div>`:''}
        <div class="acciones">

            ? `<span style="font-size:.85rem;color:#b9892f;background:#fdf3e0;padding:.5rem .8rem;border-radius:8px">⏳ Esperando pago por Mercado Pago</span>`

  // ---------- PUNTO DE VENTA ----------
  carritoPOS:[], prodPOS:[], cajaAbierta:false,
  async cargarPOS(){
    // Verificar caja
    try{
      const rc=await fetch(API+'/caja-estado?token='+encodeURIComponent(this.token),{headers:this.headers()});
      const dc=await rc.json();
      this.cajaAbierta=dc.success&&dc.abierta;
    }catch(e){this.cajaAbierta=false;}
    const aviso=document.getElementById('pos-aviso');
    const layout=document.getElementById('pos-layout');
    if(!this.cajaAbierta){
      aviso.innerHTML='<div class="aviso">⚠️ No hay caja abierta. Andá a <b>Caja</b> y abrila para poder vender.</div>';
      layout.style.opacity='.5';layout.style.pointerEvents='none';
    }else{aviso.innerHTML='';layout.style.opacity='1';layout.style.pointerEvents='auto';}
    // Cargar productos + orden guardado
    try{
      const [rp,rc]=await Promise.all([
        fetch(API+'/listar-productos?token='+encodeURIComponent(this.token),{headers:this.headers()}),
        fetch(API+'/config?clave=pos_product_order&token='+encodeURIComponent(this.token),{headers:this.headers()})
      ]);
      if(rp.status===401){this.salir('Sesión inválida');return;}
      const d=await rp.json();
      this.prodPOS=(d.productos||[]).filter(p=>p.activo&&p.precioMinorista>0);
      try{const cc=await rc.json();this.ordenPOS=cc.valor?JSON.parse(cc.valor):[];}catch(e){this.ordenPOS=[];}
      this.aplicarOrdenPOS();
      this.renderGridPOS(this.prodPOS);
    }catch(e){document.getElementById('pos-grid').innerHTML='<div class="vacio">Error al cargar productos</div>';}
  },
  ordenPOS:[], modoOrden:'manual',
  aplicarOrdenPOS(){
    if(this.modoOrden==='stock'){
      this.prodPOS.sort((a,b)=>b.stock-a.stock);
    }else{
      // Orden manual: por la lista guardada (sku), los que no están van al final
      const idx={};this.ordenPOS.forEach((sku,i)=>{idx[sku]=i;});
      this.prodPOS.sort((a,b)=>{
        const ia=idx[a.sku]!==undefined?idx[a.sku]:9999, ib=idx[b.sku]!==undefined?idx[b.sku]:9999;
        return ia-ib;
      });
    }
  },
  setModoOrden(m){this.modoOrden=m;this.aplicarOrdenPOS();this.renderGridPOS(this.prodPOS);},
  async moverProd(idx,dir){
    const ni=idx+dir; if(ni<0||ni>=this.prodPOS.length)return;
    const arr=this.prodPOS;[arr[idx],arr[ni]]=[arr[ni],arr[idx]];
    this.renderGridPOS(arr);
    // guardar nuevo orden (skus)
    this.ordenPOS=arr.map(p=>p.sku);
    try{await fetch(API+'/config',{method:'POST',headers:this.headers(),body:JSON.stringify({clave:'pos_product_order',valor:JSON.stringify(this.ordenPOS),token:this.token})});}catch(e){}
  },
  filtrarPOS(q){
    q=(q||'').toLowerCase().trim();
    this.renderGridPOS(this.prodPOS.filter(p=>p.nombre.toLowerCase().includes(q)));
  },
  renderGridPOS(lista){
    const ctrl=document.getElementById('pos-orden-ctrl');
    if(ctrl)ctrl.innerHTML=`Orden:
      <button class="filtro ${this.modoOrden==='manual'?'activo':''}" onclick="App.setModoOrden('manual')">Manual</button>
      <button class="filtro ${this.modoOrden==='stock'?'activo':''}" onclick="App.setModoOrden('stock')">Por disponibilidad</button>`;
    const manual=this.modoOrden==='manual';
    document.getElementById('pos-grid').innerHTML=lista.map((p,i)=>{
      const img=p.imagen?`style="background-image:url('${p.imagen}')"`:'';
      const emoji=p.imagen?'':'🥐';
      const flechas=manual?`<div style="display:flex;gap:.2rem;margin-bottom:.3rem">
        <button onclick="App.moverProd(${i},-1)" style="flex:1;border:1px solid #ddd;background:#fff;border-radius:6px;cursor:pointer;font-size:.7rem;padding:.15rem">↑</button>
        <button onclick="App.moverProd(${i},1)" style="flex:1;border:1px solid #ddd;background:#fff;border-radius:6px;cursor:pointer;font-size:.7rem;padding:.15rem">↓</button></div>`:'';
      const sinStock=p.stock<=0?'style="opacity:.55"':'';
      return `<div class="pcard" ${sinStock}>
        <div class="img" ${img}>${emoji}</div>
        <div class="body">
          <div class="nom">${p.nombre}</div>
          <div class="stk">Stock: ${p.stock}${p.stock<=0?' ⚠️':''}</div>
          <div class="prc">${this.money(p.precioMinorista)}</div>
          ${flechas}
          <div class="btns">
            <button onclick="App.addPOS(${p.id},1)">+1</button>
            <button onclick="App.addPOS(${p.id},6)">x6</button>
            <button onclick="App.addPOS(${p.id},12)">x12</button>
          </div>
        </div>
      </div>`;
    }).join('')||'<div class="vacio">Sin productos</div>';
  },
  addPOS(id,cant){
    const p=this.prodPOS.find(x=>x.id===id);if(!p)return;
    const ex=this.carritoPOS.find(x=>x.id===id);
    if(ex)ex.cantidad+=cant;else this.carritoPOS.push({id,nombre:p.nombre,precio:p.precioMinorista,cantidad:cant});
    this.renderCarritoPOS();
  },
  quitarPOS(id){this.carritoPOS=this.carritoPOS.filter(x=>x.id!==id);this.renderCarritoPOS();},
  renderCarritoPOS(){
    const cont=document.getElementById('pos-carrito');
    if(!this.carritoPOS.length){cont.innerHTML='<div style="color:#aaa;text-align:center;padding:1rem;font-size:.85rem">Carrito vacío</div>';document.getElementById('pos-total').textContent='$0';return;}
    let total=0;
    cont.innerHTML=this.carritoPOS.map(l=>{
      const sub=l.precio*l.cantidad;total+=sub;
      return `<div class="pos-linea"><span class="x" onclick="App.quitarPOS(${l.id})">×</span><span class="nm"><b>${l.cantidad}×</b> ${l.nombre}</span><span>${this.money(sub)}</span></div>`;
    }).join('');
    document.getElementById('pos-total').textContent=this.money(total);
  },
  async cobrar(){
    if(!this.carritoPOS.length){this.toast('Carrito vacío','err');return;}
    if(!this.cajaAbierta){this.toast('Abrí la caja primero','err');return;}
    const btn=document.getElementById('pos-cobrar');btn.disabled=true;btn.textContent='Procesando…';
    try{
      const r=await fetch(API+'/crear-venta',{method:'POST',headers:this.headers(),body:JSON.stringify({
        items:this.carritoPOS.map(l=>({productoId:l.id,cantidad:l.cantidad})),
        medioPago:document.getElementById('pos-medio').value,
        clienteNombre:document.getElementById('pos-cliente').value.trim(),
        quiereFactura:document.getElementById('pos-factura').checked,
        facturaCuit:document.getElementById('pos-cuit')?document.getElementById('pos-cuit').value.trim():'',
        token:this.token
      })});
      const d=await r.json();
      if(d.success){
        this.toast('✓ Venta #'+d.ventaId+' · '+this.money(d.total)+(d.factura?' · Factura '+d.factura:''),'ok');
        this.carritoPOS=[];this.renderCarritoPOS();
        document.getElementById('pos-cliente').value='';document.getElementById('pos-factura').checked=false;
        document.getElementById('pos-cuit-wrap').style.display='none';
        this.cargarPOS();
      }else this.toast(d.error||'Error','err');
    }catch(e){this.toast(e.message,'err');}
    btn.disabled=false;btn.textContent='Cobrar';
  },

  async cerrarCaja(esperado){

        </table></div>

  fmtTiempo(min){ if(min==null)return '—'; const h=Math.floor(min/60); const m=min%60; return h+'h '+m+'m'; },
  // Cache liviano por URL (TTL corto). Sólo lo usa la sección Producción,
  // cuyas listas no muestran stock en vivo. Se invalida al crear/borrar items.
  _cache:{},
  cachedFetch(url,ttl=60000){
    const hit=this._cache[url], now=Date.now();
    if(hit && (now-hit.t)<ttl) return Promise.resolve({ok:true,status:200,json:()=>Promise.resolve(hit.data)});
    return fetch(url,{headers:this.headers()}).then(async r=>{
      if(r.ok){const data=await r.json();this._cache[url]={t:now,data};return {ok:true,status:r.status,json:()=>Promise.resolve(data)};}
      return {ok:false,status:r.status,json:()=>Promise.resolve({})};
    });
  },
  invalidarCache(frag){for(const k in this._cache){if(!frag||k.indexOf(frag)>=0)delete this._cache[k];}},

            ${l.notas?`<div style="margin-top:.4rem;font-size:.82rem;color:#888"><i>Nota: ${l.notas}</i></div>`:''}
            <button class="btn btn-violeta btn-sm" style="margin-top:.6rem" onclick="App.finalizarTanda(${l.id},${l.cantidadEsperada||0},'${(l.producto||'').replace(/'/g,"\\'")}')">✓ Finalizar tanda</button>

  renderLotesFin(){

  },
 async recalcTanda(){
    const pid=parseInt(document.getElementById('tanda-prod').value,10);
    const cant=Number(document.getElementById('tanda-cant').value)||0;
    const req=document.getElementById('tanda-req');
    const costoEl=document.getElementById('tanda-costo');
    if(!pid||cant<=0){req.innerHTML='Seleccione producto y cantidad.';costoEl.textContent='$0.00';return;}
    req.innerHTML='Calculando…';
    try{
      this._recetaCache=this._recetaCache||{};
      let items=this._recetaCache[pid];
      if(!items){const r=await fetch(API+'/receta?productoId='+pid+'&token='+encodeURIComponent(this.token),{headers:this.headers()});items=((await r.json()).items||[]);this._recetaCache[pid]=items;}
      if(!items.length){req.innerHTML='<span style="color:#999">Sin receta — no descuenta materia prima.</span>';costoEl.textContent='$0.00';return;}
      let costo=0;
      const filas=items.map(it=>{
        const u=String(it.unidad||'').toLowerCase().trim();
        const factor=(u==='kg'||u==='l')?0.001:1;          // receta en g/ml, costo por Kg/L → ÷1000
        const uShow=u==='kg'?'g':(u==='l'?'ml':it.unidad);  // mostrar g/ml, no Kg/L
        const necesita=Number(it.cantidad)*cant;
        const cl=necesita*Number(it.costo||0)*factor;
        costo+=cl;
        return `<div style="display:flex;justify-content:space-between"><span>${it.nombre}</span><span>${(Math.round(necesita*100)/100)} ${uShow}</span></div>`;
      }).join('');
      req.innerHTML=filas;
      costoEl.textContent=this.money(costo);
    }catch(e){req.innerHTML='Error: '+e.message;}
  },
  async generarTanda(forzar){
    const pid=parseInt(document.getElementById('tanda-prod').value,10);
    const emp=document.getElementById('tanda-emp').value.trim();
    const cant=Number(document.getElementById('tanda-cant').value)||0;
    if(!pid){this.toast('Elegí un producto','err');return;}
    if(!emp){this.toast('Indicá el empleado a cargo','err');return;}
    if(cant<=0){this.toast('Cantidad esperada inválida','err');return;}
    const btn=document.getElementById('tanda-go');if(btn){btn.disabled=true;btn.textContent='Generando…';}
    try{
      const r=await fetch(API+'/producir',{method:'POST',headers:this.headers(),body:JSON.stringify({accion:'iniciar',productoId:pid,cantidadEsperada:cant,empleado:emp,forzar:!!forzar,token:this.token})});
      const d=await r.json();
      if(d.success){
        this.cerrarModal();
        this.toast('✓ Tanda iniciada: '+d.codigoTrazabilidad,'ok');
        this.cargarLotes();
      }else if(d.faltantes){
        const txt=d.faltantes.map(f=>'• '+f.nombre+': necesitás '+f.necesita+', hay '+f.disponible).join('\n');
        if(btn){btn.disabled=false;btn.textContent='Generar Lote e Iniciar';}
        if(confirm('No alcanza la materia prima:\n\n'+txt+'\n\n¿Iniciar igual? (el stock de ingredientes quedará en 0)'))this.generarTanda(true);
      }else{this.toast(d.error||'Error','err');if(btn){btn.disabled=false;btn.textContent='Generar Lote e Iniciar';}}
    }catch(e){this.toast(e.message,'err');if(btn){btn.disabled=false;btn.textContent='Generar Lote e Iniciar';}}

  async confirmarFinalizar(loteId){
    const real=Number(document.getElementById('fin-real').value);
    const nota=(document.getElementById('fin-nota')||{}).value||'';
    if(!(real>=0)){this.toast('Cantidad inválida','err');return;}
    const consumosReales=[...document.querySelectorAll('.real-ing')]
      .map(inp=>({ingredienteId:Number(inp.getAttribute('data-ing')),cantidadReal:Number(inp.value)}))
      .filter(x=>x.ingredienteId&&x.cantidadReal>=0);
    const btn=document.getElementById('fin-go');if(btn){btn.disabled=true;btn.textContent='Finalizando…';}
    try{
      const payload={accion:'finalizar',loteId,cantidadReal:real,notas:nota.trim(),token:this.token};
      if(consumosReales.length)payload.consumosReales=consumosReales;
      const r=await fetch(API+'/producir',{method:'POST',headers:this.headers(),body:JSON.stringify(payload)});
      const d=await r.json();
      if(d.success){
        this.cerrarModal();
        const dif=d.diferencia;
        let msg='✓ Lote finalizado · Dif: '+(dif>0?'+'+dif:dif)+' · '+this.fmtTiempo(d.tiempoMin);

      }else{this.toast(d.error||'Error','err');if(btn){btn.disabled=false;btn.textContent='Finalizar';}}
    }catch(e){this.toast(e.message,'err');if(btn){btn.disabled=false;btn.textContent='Finalizar';}}
  },

  graficoBarras(serie){
    if(!serie.length)return '<div style="color:#aaa;text-align:center;padding:1rem">Sin datos</div>';
    const max=Math.max(1,...serie.map(s=>s.total));
    const W=Math.max(serie.length*16,300), H=160, pad=20;
    const bw=(W-pad*2)/serie.length;
    const barras=serie.map((s,i)=>{
      const h=(s.total/max)*(H-pad*2);
      const x=pad+i*bw, y=H-pad-h;
      const fecha=s.fecha.slice(8,10)+'/'+s.fecha.slice(5,7);
      return `<rect x="${x+1}" y="${y}" width="${Math.max(bw-2,1)}" height="${h}" rx="2" fill="var(--violeta-vivo)"><title>${fecha}: ${this.money(s.total)}</title></rect>`;
    }).join('');
    // etiquetas cada ~7 barras
    const labels=serie.map((s,i)=>{
      if(i%Math.ceil(serie.length/8)!==0)return '';
      const x=pad+i*bw+bw/2;
      return `<text x="${x}" y="${H-4}" font-size="9" fill="#aaa" text-anchor="middle">${s.fecha.slice(8,10)}/${s.fecha.slice(5,7)}</text>`;
    }).join('');
    return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:170px" preserveAspectRatio="none">${barras}${labels}</svg>`;
  },

    const bajoMargen=(d.margenes||[]).filter(m=>m.costo>0&&m.margenPct<this.margenMinimo);
    const marg=(d.margenes||[]).map(m=>{
      const col=m.margenPct>=50?'var(--ok)':(m.margenPct>=25?'var(--warn)':'var(--err)');

    const avisoMargen=bajoMargen.length?`<div class="aviso" style="margin-bottom:1rem">⚠️ ${bajoMargen.length} producto(s) por debajo del margen mínimo (${this.margenMinimo}%): <b>${bajoMargen.map(m=>m.nombre).join(', ')}</b>. Conviene subir el precio o bajar el costo.</div>`:'';
    const inv=d.valorInventario||{};
    document.getElementById('rep-body').innerHTML=`
      <div class="bar">
        <button class="filtro ${this.repDias===7?'activo':''}" onclick="App.setRepDias(7)">7 días</button>
        <button class="filtro ${this.repDias===30?'activo':''}" onclick="App.setRepDias(30)">30 días</button>

        <span style="margin-left:auto"></span>
        <button class="btn btn-ghost btn-sm" onclick="App.exportarCSV()">⬇ CSV</button>
        <button class="btn btn-ghost btn-sm" onclick="App.exportarPDF()">⬇ PDF</button>
      </div>
      <div class="kpis">
        <div class="kpi verde"><div class="lbl">Ventas del período</div><div class="val">${this.money(d.totalPeriodo)}</div><div class="sub">${d.dias} días</div></div>
        <div class="kpi"><div class="lbl">Portal online</div><div class="val" style="font-size:1.3rem">${this.money(pc.minorista||0)}</div></div>
        <div class="kpi"><div class="lbl">Local (POS)</div><div class="val" style="font-size:1.3rem">${this.money(pc.pos||0)}</div></div>
        <div class="kpi"><div class="lbl">Mayorista</div><div class="val" style="font-size:1.3rem">${this.money(pc.mayorista||0)}</div></div>
      </div>
      <div class="panel">
        <h2>Ventas por día</h2>
        ${this.graficoBarras(d.ventasPorDia||[])}

      <div class="dos-col">
        <div class="panel">
          <h2>🏆 Más vendidos</h2>
          <table class="tabla"><tbody>${top}</tbody></table>
        </div>
        <div class="panel">
          <h2>💰 Márgenes por producto</h2>
          ${avisoMargen}
          <div style="overflow-x:auto"><table class="tabla">
            <thead><tr><th>Producto</th><th style="text-align:right">Precio</th><th style="text-align:right">Costo</th><th style="text-align:right">Margen</th><th style="text-align:right">%</th></tr></thead>

  graficoConsumo(lista){
    if(!lista.length)return '<div style="color:#aaa;text-align:center;padding:1rem">Sin consumo en el período (no hay ventas con receta)</div>';
    const max=Math.max(1,...lista.map(s=>s.cantidad));
    return '<div style="display:flex;flex-direction:column;gap:.4rem">'+lista.map(s=>{
      const pct=(s.cantidad/max)*100;

          </tfoot>
        </table></div>

      </div>`;

  async producirDia(diaIdx){
    const dias=['domingo','lunes','martes','miércoles','jueves','viernes','sábado'];
    // Recolectar productos con cantidad > 0 en esa columna
    const aProducir=[];
    this.planFilas.forEach((f,fi)=>{

    let ok=0, err=0;
    for(const it of aProducir){

        if(d.success)ok++;else err++;
      }catch(e){err++;}
    }

  },

  
  // ---------- CLIMA vs VENTAS (Open-Meteo / SMN) ----------
  async cargarClima(ventasPorDia){
    const cont=document.getElementById('clima-body');
    if(!cont)return;
    if(!ventasPorDia.length){cont.innerHTML='<div style="color:#aaa;text-align:center;padding:1rem">Sin ventas en el período para cruzar con el clima.</div>';return;}
    const fechas=ventasPorDia.map(v=>v.fecha).sort();
    const desde=fechas[0], hasta=fechas[fechas.length-1];
    try{
      const r=await fetch(API+'/clima?desde='+desde+'&hasta='+hasta+'&token='+encodeURIComponent(this.token),{headers:this.headers()});
      const d=await r.json();
      if(!d.success)throw new Error(d.error||'Error');
      const climaPorFecha={};(d.dias||[]).forEach(x=>{climaPorFecha[x.fecha]=x;});
      // Cruzar
      const cruce=ventasPorDia.map(v=>({...v, clima:climaPorFecha[v.fecha]})).filter(x=>x.clima);
      if(!cruce.length){cont.innerHTML='<div style="color:#aaa;text-align:center;padding:1rem">No se pudo cruzar el clima con las ventas del período.</div>';return;}
      // Análisis lluvia vs seco
      const lluvia=cruce.filter(x=>x.clima.lluvia>1);
      const seco=cruce.filter(x=>x.clima.lluvia<=1);
      const prom=arr=>arr.length?Math.round(arr.reduce((s,x)=>s+x.total,0)/arr.length):0;
      const promLluvia=prom(lluvia), promSeco=prom(seco);
      const difPct=promSeco?Math.round((promLluvia-promSeco)/promSeco*100):0;
      // Análisis por temperatura
      const fresco=cruce.filter(x=>x.clima.tmax<18), templado=cruce.filter(x=>x.clima.tmax>=18&&x.clima.tmax<=28), caluroso=cruce.filter(x=>x.clima.tmax>28);
      // Insight
      let insight='';
      if(lluvia.length&&seco.length){
        insight=difPct<-5?`Los días de lluvia vendés ~${Math.abs(difPct)}% menos que los secos.`:(difPct>5?`Curiosamente, los días de lluvia vendés ~${difPct}% más.`:'La lluvia no parece afectar mucho tus ventas.');
      }
      // ---- Sugerencia accionable: pronóstico de mañana vs correlación ----
      const promGeneral=prom(cruce);
      let sugerencia='';
      try{
        const rp=await fetch(API+'/clima?pronostico=2&token='+encodeURIComponent(this.token),{headers:this.headers()});
        const dp=await rp.json();
        if(dp.success&&dp.pronostico&&dp.pronostico.length){
          const man=dp.pronostico[0];
          const lluvioso=man.lluvia>1, calido=man.tmax>28, fresco_=man.tmax<12;
          let promEsperado=promGeneral, tipo='templado', ic='⛅';
          if(lluvioso){promEsperado=promLluvia;tipo='lluvia';ic='🌧️';}
          else if(calido){promEsperado=prom(caluroso)||promGeneral;tipo='calor';ic='☀️';}
          else if(fresco_){promEsperado=prom(fresco)||promGeneral;tipo='frío';ic='❄️';}
          const ajuste=promGeneral?Math.round((promEsperado-promGeneral)/promGeneral*100):0;
          const fechaMan=new Date(man.fecha+'T12:00').toLocaleDateString('es-AR',{weekday:'long',day:'numeric',month:'long'});
          let accion='';
          if(ajuste<=-8)accion=`Históricamente esos días vendés ~${Math.abs(ajuste)}% menos. <b>Conviene producir más moderado</b> para no quedar con sobrante.`;
          else if(ajuste>=8)accion=`Históricamente esos días vendés ~${ajuste}% más. <b>Conviene producir un poco más</b> para no quedar corto.`;
          else accion='Un día de ventas normales. Producí lo habitual.';
          sugerencia=`<div style="background:linear-gradient(120deg,var(--violeta),var(--violeta-vivo));color:#fff;border-radius:14px;padding:1rem 1.2rem;margin-bottom:1rem">
            <div style="font-size:.8rem;opacity:.85;text-transform:capitalize">${ic} Mañana · ${fechaMan}</div>
            <div style="font-size:1.05rem;font-weight:600;margin:.2rem 0;font-family:'Fredoka'">${Math.round(man.tmax)}° máx · ${man.lluvia>0?man.lluvia+' mm de lluvia':'sin lluvia'} · día de ${tipo}</div>
            <div style="font-size:.9rem;opacity:.95">${accion}</div>
          </div>`;

      <input id="ccp-comp" placeholder="…o pegá un link al comprobante" style="width:100%;padding:.6rem;border:1px solid #ddd;border-radius:8px;margin:.3rem 0 .3rem">
      <p style="font-size:.74rem;color:#aaa;margin-bottom:.8rem">Subí la foto/PDF del comprobante o pegá un link. Queda guardado en el pago.</p>
      <button class="btn btn-violeta" style="width:100%" onclick="App.ccConfirmarPago('${email.replace(/'/g,"")}','${(nombre||'').replace(/'/g,"")}')">Registrar pago</button>`);
  },
  async ccSubirComprobante(input){
    const f=input.files[0]; if(!f)return;
    const msg=document.getElementById('ccp-filemsg');
    msg.textContent='Subiendo…';
    try{
      const b64=await this.fileABase64(f);
      const r=await fetch(API+'/subir-archivo',{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify({carpeta:'comprobantes',nombre:'comp',contenidoBase64:b64,tipo:f.type})});
      const d=await r.json();
      if(d.success){document.getElementById('ccp-comp').value=d.url;msg.innerHTML='✓ Comprobante subido';msg.style.color='var(--ok)';}
      else{msg.textContent='Error: '+(d.error||'no se pudo subir');msg.style.color='var(--err)';}
    }catch(e){msg.textContent='Error: '+e.message;msg.style.color='var(--err)';}
  },
  fileABase64(file){return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(String(r.result).split(',')[1]);r.onerror=rej;r.readAsDataURL(file);});},
  async ccConfirmarPago(email,nombre){
    const m=Number(document.getElementById('ccp-monto').value);
    if(!m||m<=0){this.toast('Monto inválido','err');return;}
    const metodo=document.getElementById('ccp-metodo').value;
    const comp=document.getElementById('ccp-comp').value.trim();
    const detalle='Pago '+metodo+(comp?' (con comprobante)':'');
    try{const r=await fetch(API+'/cuenta-corriente',{method:'POST',headers:this.headers(),body:JSON.stringify({accion:'pago',email,nombre,monto:m,metodo,comprobanteUrl:comp,detalle,token:this.token})});
      const d=await r.json();if(d.success){this.cerrarModal();this.toast('✓ Pago registrado · saldo: '+this.money(d.saldo),'ok');this.cargarCuentaCorriente();}else this.toast(d.error,'err');}catch(e){this.toast(e.message,'err');}
  },
  ccAjuste(){
    const email=prompt('Email del cliente para configurar saldo inicial:');
    if(!email)return;
    const monto=prompt('Saldo inicial (cuánto debe):');
    if(!monto)return;
    const m=Number(monto); if(isNaN(m)){this.toast('Monto inválido','err');return;}
    fetch(API+'/cuenta-corriente',{method:'POST',headers:this.headers(),body:JSON.stringify({accion:'ajuste',email:email.trim().toLowerCase(),monto:m,detalle:'Saldo inicial',token:this.token})})
      .then(r=>r.json()).then(d=>{if(d.success){this.toast('✓ Saldo configurado','ok');this.cargarCuentaCorriente();}else this.toast(d.error,'err');}).catch(e=>this.toast(e.message,'err'));
  },
  async ccVer(email,nombre){
    this.abrirModal('Cuenta corriente · '+(nombre||email),'<div class="spin">Cargando…</div>');
    try{
      const r=await fetch(API+'/cuenta-corriente?email='+encodeURIComponent(email)+'&token='+encodeURIComponent(this.token),{headers:this.headers()});
      const d=await r.json();
      const movs=(d.movimientos||[]).map(m=>{

        const comp=m.comprobante_url?` <a href="${m.comprobante_url}" target="_blank" style="color:var(--violeta-vivo);font-size:.72rem">📎 ver</a>`:'';

        return `<tr><td style="font-size:.78rem;color:#888">${m.fecha?new Date(m.fecha).toLocaleDateString('es-AR'):''}</td><td style="font-size:.82rem">${m.detalle||m.tipo}${met}${comp}</td><td style="text-align:right;font-weight:600;color:${suma?'var(--err)':'var(--ok)'}">${suma?'+':''}${this.money(m.monto)}</td></tr>`;

          <div class="fred" style="font-size:1.8rem;font-weight:700;color:${d.saldo>0?'var(--err)':'var(--ok)'}">${this.money(d.saldo)}</div>
        </div>
        <table class="tabla"><thead><tr><th>Fecha</th><th>Detalle</th><th style="text-align:right">Monto</th></tr></thead><tbody>${movs||'<tr><td colspan=3 style="text-align:center;color:#aaa">Sin movimientos</td></tr>'}</tbody></table>`;

  // ---------- ALMACÉN / ÓRDENES DE COMPRA ----------
  _ordenes:[], _ocIngs:[], _ocItems:[],
  estadoOC(e){return ({pendiente:['#92670a','#fef3c7','Pendiente'],recibida:['#1d4ed8','#dbeafe','Recibida'],cargada:['#1d7a45','#dcf5e6','Cargada'],anulada:['#b42318','#fde8e6','Anulada']})[e]||['#666','#eee',e];},
  // ---------- ESTRATEGIAS (análisis de ventas, paso 7) ----------
  repEstrDias:30,
  setEstrDias(d){this.repEstrDias=d;this.cargarEstrategias();},
  async cargarEstrategias(){
    const el=document.getElementById('estrategias-body');if(!el)return;
    el.innerHTML='<div class="spin">Analizando ventas…</div>';
    try{
      const r=await fetch(API+'/estrategias?dias='+this.repEstrDias+'&token='+encodeURIComponent(this.token),{headers:this.headers()});
      if(r.status===401){this.salir('Clave incorrecta');return;}
      const d=await r.json();
      if(!d.success){el.innerHTML='<div class="vacio">Error: '+(d.error||'')+'</div>';return;}
      const esc=s=>String(s||'').replace(/'/g,"\\'");
      const sel=[30,90,180].map(n=>`<button class="chip" style="cursor:pointer;border:1px solid ${this.repEstrDias===n?'var(--violeta-vivo)':'#ddd'};background:${this.repEstrDias===n?'var(--violeta-vivo)':'#fff'};color:${this.repEstrDias===n?'#fff':'#555'}" onclick="App.setEstrDias(${n})">${n} días</button>`).join(' ');

      const top=(d.topVendidos||[]).map(p=>`
        <tr>
          <td>${p.nombre}</td>
          <td style="text-align:right"><b>${p.unidades}</b></td>
          <td style="text-align:right;color:#888">${this.money(p.ingreso)}</td>
          <td style="text-align:right">${this.money(p.precio)}</td>
          <td style="text-align:right;color:${p.margenPct!=null&&p.margenPct<25?'var(--err)':'#1d7a45'}">${p.margenPct==null?'—':p.margenPct+'%'}</td>
          <td style="text-align:right"><button class="btn btn-violeta btn-sm" onclick="App.ajustarPrecioEstr(${p.id},'${esc(p.nombre)}',${p.precio})">Ajustar precio</button></td>
        </tr>`).join('')||'<tr><td colspan="6" style="text-align:center;color:#aaa">Sin ventas en el período</td></tr>';

      const baja=(d.bajaSalida||[]).map(p=>`
        <tr>
          <td>${p.nombre}</td>
          <td style="text-align:right"><b style="color:${p.unidades===0?'var(--err)':'#c9821a'}">${p.unidades}</b></td>
          <td style="text-align:right;color:#888">${p.stock} en stock</td>
          <td style="text-align:right"><button class="btn btn-ghost btn-sm" onclick="App.ir('promos')">🎉 Crear promo</button></td>
        </tr>`).join('')||'<tr><td colspan="4" style="text-align:center;color:#aaa">Todo con buena salida 👌</td></tr>';

      el.innerHTML=`
        <div style="display:flex;flex-wrap:wrap;gap:.6rem;align-items:center;margin-bottom:1rem">
          <div style="font-size:.85rem;color:#888">Período:</div>${sel}
          <div style="margin-left:auto;display:flex;gap:1rem;font-size:.85rem;color:#888">
            <span>Unidades: <b style="color:#333">${d.totalUnidades}</b></span>
            <span>Ingreso: <b style="color:#333">${this.money(d.totalIngreso)}</b></span>
          </div>
        </div>
        <div class="panel" style="margin-bottom:1.2rem">
          <h2>🔥 Los que más salen <span style="font-weight:400;font-size:.82rem;color:#888">· revisá si conviene ajustar el precio</span></h2>
          <table class="tabla"><thead><tr><th>Producto</th><th style="text-align:right">Unid.</th><th style="text-align:right">Ingreso</th><th style="text-align:right">Precio</th><th style="text-align:right">Margen</th><th></th></tr></thead><tbody>${top}</tbody></table>
        </div>
        <div class="panel">
          <h2>🐌 Poca salida <span style="font-weight:400;font-size:.82rem;color:#888">· candidatos a promoción</span></h2>
          <table class="tabla"><thead><tr><th>Producto</th><th style="text-align:right">Unid.</th><th style="text-align:right">Stock</th><th></th></tr></thead><tbody>${baja}</tbody></table>
        </div>`;
    }catch(e){el.innerHTML='<div class="vacio">Error: '+e.message+'</div>';}
  },
  async ajustarPrecioEstr(id,nombre,precioActual){
    const val=prompt('Nuevo precio minorista para "'+nombre+'":',precioActual);
    if(val==null)return;
    const nuevo=Number(val);
    if(!(nuevo>=0)){this.toast('Precio inválido','err');return;}
    try{
      const r=await fetch(API+'/gestionar-producto',{method:'POST',headers:this.headers(),body:JSON.stringify({accion:'editar',id,precioMinorista:nuevo,token:this.token})});
      const d=await r.json();
      if(d.success){this.invalidarCache();this.toast('✓ Precio actualizado','ok');this.cargarEstrategias();}
      else this.toast(d.error||'Error','err');
    }catch(e){this.toast(e.message,'err');}
  },

  async cargarCompras(){
    const el=document.getElementById('compras-body');
    el.innerHTML='<div class="spin">Cargando…</div>';
    try{
      const [ri,ro]=await Promise.all([
        fetch(API+'/listar-ingredientes?token='+encodeURIComponent(this.token),{headers:this.headers()}),
        fetch(API+'/compras-orden?token='+encodeURIComponent(this.token),{headers:this.headers()})
      ]);
      this._ocIngs=((await ri.json()).ingredientes||[]);
      this.setNavAlertBadge(this._ocIngs.filter(i=>i.bajo).length);
      this._ordenes=((await ro.json()).ordenes||[]);
      const pend=this._ordenes.filter(o=>o.estado==='pendiente');
      const reci=this._ordenes.filter(o=>o.estado==='recibida');
      const hist=this._ordenes.filter(o=>o.estado==='cargada'||o.estado==='anulada');

        const tot=o.totalReal!=null?o.totalReal:o.totalEstimado;
        return `<div style="border:1px solid #eee;background:#fafafa;border-radius:12px;padding:.9rem 1rem;margin-bottom:.7rem">
          <div style="display:flex;justify-content:space-between;align-items:center;gap:.5rem;flex-wrap:wrap">
            <b>OC #${o.id}${o.proveedor?' · '+o.proveedor:''}</b>
            <span class="chip" style="background:${bg};color:${c}">${txt}</span>
          </div>
          <div style="font-size:.78rem;color:#999;margin:.2rem 0 .5rem">${o.creadaEn?new Date(o.creadaEn).toLocaleString('es-AR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}):''}${o.responsable?' · '+o.responsable:''}</div>
          ${lineas}
          <div style="display:flex;justify-content:space-between;border-top:1px solid #eee;margin-top:.5rem;padding-top:.5rem;font-weight:600"><span>Total ${o.totalReal!=null?'real':'estimado'}</span><span>${this.money(tot)}</span></div>
          ${o.notas?`<div style="font-size:.8rem;color:#888;margin-top:.4rem"><i>${o.notas}</i></div>`:''}
          ${botones?`<div style="display:flex;gap:.5rem;flex-wrap:wrap;margin-top:.7rem">${botones}</div>`:''}
        </div>`;
      };
      el.innerHTML=`
        <div class="panel">
          <div style="display:flex;align-items:flex-start;gap:.6rem;flex-wrap:wrap">
            <div><h2 style="margin:0">📦 Almacén / Órdenes de Compra</h2>
            <p style="font-size:.85rem;color:#888;margin:.25rem 0 0">Pedís a proveedor → llega y hacés el check → cargás a stock</p></div>
            <button class="btn btn-violeta" style="margin-left:auto" onclick="App.nuevaOrdenCompra()">➕ Nueva Orden</button>
          </div>
        </div>
        <div class="panel"><h2>🟡 Pendientes de recepción</h2>${pend.length?pend.map(o=>card(o,
          `<button class="btn btn-violeta btn-sm" onclick="App.recibirOrden(${o.id})">📋 Recibir / Check</button>
           <button class="btn btn-ghost btn-sm" onclick="App.cargarOrdenStock(${o.id})">⬆️ Cargar directo</button>
           <button class="btn btn-ghost btn-sm" style="color:var(--err)" onclick="App.anularOrden(${o.id})">Anular</button>`)).join(''):'<div style="color:#aaa;text-align:center;padding:1rem">No hay órdenes pendientes.</div>'}</div>
        <div class="panel" style="border-left:3px solid #1d4ed8"><h2>🔵 Recibidas (listas para cargar)</h2>${reci.length?reci.map(o=>card(o,
          `<button class="btn btn-violeta btn-sm" onclick="App.cargarOrdenStock(${o.id})">⬆️ Cargar a stock</button>
           <button class="btn btn-ghost btn-sm" onclick="App.recibirOrden(${o.id})">Editar check</button>
           <button class="btn btn-ghost btn-sm" style="color:var(--err)" onclick="App.anularOrden(${o.id})">Anular</button>`)).join(''):'<div style="color:#aaa;text-align:center;padding:1rem">Nada recibido pendiente de cargar.</div>'}</div>
        <div class="panel"><h2>Historial</h2>${hist.length?hist.map(o=>card(o,'')).join(''):'<div style="color:#aaa;text-align:center;padding:1rem">Sin movimientos aún.</div>'}</div>`;
    }catch(e){el.innerHTML='<div class="vacio">Error: '+e.message+'</div>';}
  },
  _renderOCItems(){
    const cont=document.getElementById('oc-items');if(!cont)return;
    if(!this._ocItems.length){cont.innerHTML='<div style="color:#aaa;font-size:.84rem;padding:.4rem 0">Agregá ingredientes a la orden…</div>';}
    else{cont.innerHTML=this._ocItems.map((it,idx)=>`<div style="display:flex;justify-content:space-between;align-items:center;gap:.5rem;border-bottom:1px solid #eee;padding:.4rem 0">
      <span style="flex:1">${it.nombre}</span>
      <span style="font-size:.85rem;color:#666">${it.cantidad} × ${this.money(it.costoUnitario)} = <b>${this.money(it.cantidad*it.costoUnitario)}</b></span>
      <button class="btn btn-sm btn-ghost" style="color:var(--err)" onclick="App.quitarItemOC(${idx})">✕</button></div>`).join('');}
    const tot=this._ocItems.reduce((s,it)=>s+it.cantidad*it.costoUnitario,0);
    const te=document.getElementById('oc-total');if(te)te.textContent=this.money(tot);
  },

      <div style="display:flex;gap:.6rem;justify-content:flex-end">
        <button class="btn btn-ghost" onclick="App.cerrarModal()">Cancelar</button>
        <button class="btn btn-violeta" id="oc-go" onclick="App.guardarOrdenCompra()">Crear Orden (pendiente)</button>
      </div>`);

  agregarItemOC(){
    const sel=document.getElementById('oc-ing');
    const id=parseInt(sel.value,10);
    const cant=Number(document.getElementById('oc-cant').value);
    const costo=Number(document.getElementById('oc-costo').value);
    if(!id){this.toast('Elegí un ingrediente','err');return;}
    if(!(cant>0)){this.toast('Cantidad inválida','err');return;}
    if(!(costo>=0)){this.toast('Costo inválido','err');return;}
    const ing=this._ocIngs.find(i=>i.id===id)||{};
    this._ocItems.push({ingredienteId:id,nombre:ing.nombre||('#'+id),cantidad:cant,costoUnitario:costo});
    document.getElementById('oc-cant').value='';document.getElementById('oc-costo').value='';
    this._renderOCItems();
  },
  quitarItemOC(idx){this._ocItems.splice(idx,1);this._renderOCItems();},
  async guardarOrdenCompra(){
    if(!this._ocItems.length){this.toast('Agregá al menos un ingrediente','err');return;}
    const btn=document.getElementById('oc-go');if(btn){btn.disabled=true;btn.textContent='Creando…';}
    try{
      const r=await fetch(API+'/compras-orden',{method:'POST',headers:this.headers(),body:JSON.stringify({
        accion:'crear',proveedor:document.getElementById('oc-prov').value.trim(),
        responsable:document.getElementById('oc-resp').value.trim(),notas:document.getElementById('oc-notas').value.trim(),
        items:this._ocItems,token:this.token})});
      const d=await r.json();
      if(d.success){this.cerrarModal();this.toast('✓ Orden #'+d.ordenId+' creada','ok');this.cargarCompras();}
      else{this.toast(d.error||'Error','err');if(btn){btn.disabled=false;btn.textContent='Crear Orden (pendiente)';}}
    }catch(e){this.toast(e.message,'err');if(btn){btn.disabled=false;btn.textContent='Crear Orden (pendiente)';}}
  },
  recibirOrden(ordenId){
    const o=this._ordenes.find(x=>x.id===ordenId);if(!o)return;
    const filas=o.items.map(it=>`<div style="display:flex;align-items:center;gap:.5rem;border-bottom:1px solid #eee;padding:.5rem 0">
      <span style="flex:1">${it.nombre||('#'+it.ingredienteId)}<br><span style="font-size:.76rem;color:#999">pedido: ${it.cantidadPedida}</span></span>
      <div><label style="font-size:.72rem;color:#999">recibido</label>
        <input data-it="${it.id}" class="oc-rec" type="number" min="0" step="0.01" value="${it.cantidadRecibida!=null?it.cantidadRecibida:it.cantidadPedida}" style="width:90px;padding:.4rem;border:1px solid #ddd;border-radius:8px"></div>
      <div><label style="font-size:.72rem;color:#999">costo</label>
        <input data-it="${it.id}" class="oc-rec-costo" type="number" min="0" step="0.01" value="${it.costoUnitario}" style="width:90px;padding:.4rem;border:1px solid #ddd;border-radius:8px"></div>
    </div>`).join('');
    this.abrirModal('Recepción / Check · OC #'+o.id,`
      <p style="font-size:.84rem;color:#888;margin-bottom:.6rem">Ajustá lo que realmente llegó (pedido vs recibido) y el costo real. Esto todavía no toca el stock.</p>
      ${filas}
      <div style="display:flex;gap:.6rem;justify-content:flex-end;margin-top:1rem">
        <button class="btn btn-ghost" onclick="App.cerrarModal()">Cancelar</button>
        <button class="btn btn-violeta" id="oc-rec-go" onclick="App.confirmarRecibir(${o.id})">Guardar recepción</button>
      </div>`);
  },
  async confirmarRecibir(ordenId){
    const recs=[...document.querySelectorAll('.oc-rec')];
    const costos=[...document.querySelectorAll('.oc-rec-costo')];
    const items=recs.map((inp,i)=>({itemId:parseInt(inp.getAttribute('data-it'),10),cantidadRecibida:Number(inp.value),costoUnitario:Number(costos[i].value)}));
    const btn=document.getElementById('oc-rec-go');if(btn){btn.disabled=true;btn.textContent='Guardando…';}
    try{
      const r=await fetch(API+'/compras-orden',{method:'POST',headers:this.headers(),body:JSON.stringify({accion:'recibir',ordenId,items,token:this.token})});
      const d=await r.json();
      if(d.success){this.cerrarModal();this.toast('✓ Recepción guardada','ok');this.cargarCompras();}
      else{this.toast(d.error||'Error','err');if(btn){btn.disabled=false;btn.textContent='Guardar recepción';}}
    }catch(e){this.toast(e.message,'err');if(btn){btn.disabled=false;btn.textContent='Guardar recepción';}}
  },
  async cargarOrdenStock(ordenId){
    if(!confirm('¿Cargar esta orden a stock? Suma las cantidades a los ingredientes y actualiza sus costos.'))return;

      const r=await fetch(API+'/compras-orden',{method:'POST',headers:this.headers(),body:JSON.stringify({accion:'cargar',ordenId,token:this.token})});
      const d=await r.json();
      if(d.success){this.toast(d.yaCargada?'Ya estaba cargada':'✓ Cargada · '+d.ingredientesCargados+' ingredientes · '+d.productosRecalculados+' productos recalculados','ok');this.cargarCompras();}
      else this.toast(d.error||'Error','err');
    }catch(e){this.toast(e.message,'err');}
  },
  async anularOrden(ordenId){
    if(!confirm('¿Anular la orden #'+ordenId+'?'))return;
    try{
      const r=await fetch(API+'/compras-orden',{method:'POST',headers:this.headers(),body:JSON.stringify({accion:'anular',ordenId,token:this.token})});
