  // ---------- DOCUMENTOS · DATA ENTRY AUTOMÁTICO (costo cero) ----------
  docExtraido:null,
  async cargarDocumentos(){
    const el=document.getElementById('doc-body');
    el.innerHTML='<div class="spin">Cargando…</div>';
    try{
      const r=await fetch(API+'/documentos?token='+encodeURIComponent(this.token),{headers:this.headers()});
      if(r.status===401){this.salir('Sesión inválida');return;}
      const d=await r.json();
      if(!d.success)throw new Error(d.error||'Error');
      const docs=d.documentos||[];
      const tLabel={factura:'Factura',comprobante:'Comprobante',factura_proveedor:'Fact. proveedor'};
      const filas=docs.map(x=>`
        <tr>
          <td style="font-size:.78rem;color:#888">${x.fecha||(x.creado_en?new Date(x.creado_en).toLocaleDateString('es-AR'):'')}</td>
          <td><span class="badge" style="background:#e8eaf6;color:#3f3e7a">${tLabel[x.tipo]||x.tipo}</span></td>
          <td style="font-size:.85rem"><b>${x.emisor||'—'}</b>${x.cuit?`<div style="font-size:.72rem;color:#aaa">CUIT ${x.cuit}</div>`:''}</td>
          <td style="font-size:.82rem">${x.numero||'—'}</td>
          <td style="text-align:right;font-weight:600">${this.money(x.importe_total)}</td>
          <td>${x.estado==='revisado'?'<span class="badge pago-ok">revisado</span>':'<span class="badge pago-pend">a revisar</span>'}</td>
          <td style="text-align:right;white-space:nowrap">
            ${x.archivo_url?`<a href="${x.archivo_url}" target="_blank" class="btn btn-sm btn-ghost">📎</a>`:''}
            <button class="btn btn-sm btn-ghost" onclick="App.docVer(${x.id})">Ver</button>
          </td>
        </tr>`).join('');
      el.innerHTML=`
        <div class="panel">
          <h2 style="margin-bottom:.3rem">📑 Lector de documentos</h2>
          <p style="font-size:.84rem;color:#888;margin-bottom:.9rem">Subí la foto de una factura o comprobante. El sistema lee el <b>QR de AFIP</b> (datos fiscales exactos) y hace <b>OCR</b> del resto, todo en tu navegador y sin costo. Después revisás y guardás.</p>
          <div style="display:flex;gap:.6rem;flex-wrap:wrap;align-items:center">
            <input type="file" id="doc-file" accept="image/*" onchange="App.docProcesar(this)" style="flex:1;min-width:220px;padding:.5rem;border:1px solid #ddd;border-radius:8px">
          </div>
          <div id="doc-proceso" style="margin-top:.8rem"></div>
          <div id="doc-form"></div>
        </div>
        <div class="panel">
          <h2 style="margin-bottom:.3rem">Documentos cargados (${docs.length})</h2>
          <p style="font-size:.82rem;color:#888;margin-bottom:.8rem">Todo el data entry, ordenado para monitoreo. "A revisar" = recién extraído; revisalo y marcá listo.</p>
          <div style="overflow-x:auto"><table class="tabla"><thead><tr><th>Fecha</th><th>Tipo</th><th>Emisor</th><th>Número</th><th style="text-align:right">Total</th><th>Estado</th><th></th></tr></thead><tbody>${filas||'<tr><td colspan="7" style="text-align:center;color:#aaa;padding:1rem">Todavía no cargaste documentos</td></tr>'}</tbody></table></div>
        </div>`;
    }catch(e){el.innerHTML='<div class="vacio">Error: '+e.message+'</div>';}
  },

  // Decodifica el QR de AFIP (URL afip.gob.ar/fe/qr/?p=base64 → JSON con datos fiscales)
  parseQrAfip(texto){
    try{
      let p=null;
      const m=String(texto).match(/[?&]p=([A-Za-z0-9+/=_-]+)/);
      if(m)p=m[1];
      if(!p)return null;
      let b64=p.replace(/-/g,'+').replace(/_/g,'/');
      const json=JSON.parse(decodeURIComponent(escape(atob(b64))));
      return json; // {ver,fecha,cuit,ptoVta,tipoCmp,nroCmp,importe,moneda,...,codAut}
    }catch(e){return null;}
  },

  async docProcesar(input){
    const f=input.files[0]; if(!f)return;
    const proc=document.getElementById('doc-proceso');
    const form=document.getElementById('doc-form'); form.innerHTML='';
    proc.innerHTML='<div class="spin">Leyendo la imagen…</div>';
    try{
      // 1) Subir el archivo a Storage (para tener el respaldo)
      const b64=await this.fileABase64(f);
      let archivoUrl='';
      try{
        const rs=await fetch(API+'/subir-archivo',{method:'POST',headers:this.headers(),body:JSON.stringify({carpeta:'comprobantes',nombre:'doc',contenidoBase64:b64,tipo:f.type,token:this.token})});
        const ds=await rs.json(); if(ds.success)archivoUrl=ds.url;
      }catch(e){}

      // 2) Cargar la imagen en un canvas
      const img=new Image(); img.src='data:'+f.type+';base64,'+b64;
      await new Promise(r=>{img.onload=r;});
      const cv=document.createElement('canvas'); cv.width=img.width; cv.height=img.height;
      const ctx=cv.getContext('2d'); ctx.drawImage(img,0,0);

      // 3) Intentar leer QR de AFIP
      let qr=null;
      try{
        const imgData=ctx.getImageData(0,0,cv.width,cv.height);
        const code=jsQR(imgData.data,cv.width,cv.height);
        if(code&&code.data)qr=this.parseQrAfip(code.data);
      }catch(e){}

      // 4) OCR del texto (Tesseract) — para emisor, ítems y comprobantes sin QR
      proc.innerHTML='<div class="spin">Extrayendo texto (OCR)… puede tardar unos segundos</div>';
      let texto='';
      try{
        const res=await Tesseract.recognize(img.src,'spa');
        texto=res.data.text||'';
      }catch(e){ texto=''; }

      // 5) Armar los datos extraídos
      const datos=this.extraerDatos(qr,texto);
      datos.archivoUrl=archivoUrl; datos.datosQr=qr; datos.textoOcr=texto;
      this.docExtraido=datos;
      proc.innerHTML=qr?'<div class="aviso" style="font-size:.85rem">✓ QR de AFIP leído: datos fiscales exactos.</div>':'<div class="aviso" style="font-size:.85rem;background:#fdf3e0;border-color:#e7c98f">Sin QR de AFIP — datos extraídos por OCR, revisalos bien.</div>';
      this.docRenderForm(datos);
    }catch(e){proc.innerHTML='<div class="vacio">Error: '+e.message+'</div>';}
  },

  extraerDatos(qr,texto){
    const d={tipo:'comprobante',origen:'mayorista',emisor:'',cuit:'',numero:'',fecha:'',importeTotal:0,cae:'',metodo:'',items:[]};
    if(qr){
      d.tipo='factura';
      d.cuit=String(qr.cuit||'');
      d.fecha=qr.fecha||'';
      d.importeTotal=Number(qr.importe)||0;
      d.cae=String(qr.codAut||'');
      if(qr.ptoVta&&qr.nroCmp)d.numero=String(qr.ptoVta).padStart(5,'0')+'-'+String(qr.nroCmp).padStart(8,'0');
      const tipos={1:'Factura A',6:'Factura B',11:'Factura C',51:'Factura M'};
      d.tipoComprobante=tipos[qr.tipoCmp]||('Tipo '+qr.tipoCmp);
    }
    const t=texto||'';
    // CUIT (si no vino del QR)
    if(!d.cuit){const m=t.match(/\b(\d{2}[-\s]?\d{8}[-\s]?\d)\b/);if(m)d.cuit=m[1].replace(/[-\s]/g,'');}
    // Fecha DD/MM/AAAA
    if(!d.fecha){const m=t.match(/\b(\d{1,2})\/(\d{1,2})\/(\d{2,4})\b/);if(m){let y=m[3].length===2?'20'+m[3]:m[3];d.fecha=`${y}-${m[2].padStart(2,'0')}-${m[1].padStart(2,'0')}`;}}
    // Importe total (busca "total" + número)
    if(!d.importeTotal){const m=t.match(/total[^\d]{0,12}\$?\s*([\d.]+,\d{2})/i);if(m)d.importeTotal=this.parseMonto(m[1]);}
    // Emisor: primera línea con texto (heurística)
    if(!d.emisor){const lineas=t.split('\n').map(x=>x.trim()).filter(x=>x.length>3&&/[a-zA-Z]/.test(x));if(lineas.length)d.emisor=lineas[0].slice(0,60);}
    // Método de pago si lo menciona
    if(/transferencia/i.test(t))d.metodo='transferencia';
    else if(/mercado\s*pago/i.test(t))d.metodo='mercadopago';
    else if(/efectivo/i.test(t))d.metodo='efectivo';
    // Ítems: líneas que tienen una descripción y un precio al final
    const items=[];
    t.split('\n').forEach(l=>{
      const m=l.match(/^(.+?)\s+(\d+)?\s*\$?\s*([\d.]+,\d{2})\s*$/);
      if(m&&m[1].length>3&&/[a-zA-Z]/.test(m[1])){
        const cant=m[2]?Number(m[2]):1; const sub=this.parseMonto(m[3]);
        items.push({descripcion:m[1].trim().slice(0,80),cantidad:cant,precioUnitario:cant?Math.round(sub/cant*100)/100:sub,subtotal:sub});
      }
    });
    d.items=items.slice(0,30);
    return d;
  },
  parseMonto(s){return Number(String(s).replace(/\./g,'').replace(',','.'))||0;},

  docRenderForm(d){
    const itemsRows=(d.items||[]).map((it,i)=>`
      <tr>
        <td><input value="${(it.descripcion||'').replace(/"/g,'&quot;')}" oninput="App.docExtraido.items[${i}].descripcion=this.value" style="width:100%;border:1px solid #eee;border-radius:6px;padding:.3rem;font-size:.82rem"></td>
        <td><input type="number" value="${it.cantidad}" oninput="App.docExtraido.items[${i}].cantidad=Number(this.value)" style="width:55px;border:1px solid #eee;border-radius:6px;padding:.3rem;text-align:center"></td>
        <td><input type="number" value="${it.subtotal}" oninput="App.docExtraido.items[${i}].subtotal=Number(this.value)" style="width:90px;border:1px solid #eee;border-radius:6px;padding:.3rem;text-align:right"></td>
        <td><button class="btn btn-sm" style="background:#fde8e6;color:#b13a34" onclick="App.docExtraido.items.splice(${i},1);App.docRenderForm(App.docExtraido)">×</button></td>
      </tr>`).join('');
    const inp=(label,campo,val,tipo)=>`<div style="flex:1;min-width:150px"><label style="font-size:.78rem;color:#666">${label}</label><input ${tipo||''} value="${val||''}" oninput="App.docExtraido.${campo}=this.value" style="width:100%;padding:.5rem;border:1px solid #ddd;border-radius:8px;margin-top:.2rem"></div>`;
    document.getElementById('doc-form').innerHTML=`
      <div style="border:1px solid #ece8df;border-radius:12px;padding:1rem;margin-top:.8rem;background:#fbfaf7">
        <h3 style="font-size:.95rem;color:var(--violeta-osc);margin-bottom:.7rem">Datos extraídos — revisá y ajustá si hace falta</h3>
        <div style="display:flex;gap:.6rem;flex-wrap:wrap;margin-bottom:.6rem">
          <div style="flex:1;min-width:150px"><label style="font-size:.78rem;color:#666">Tipo</label>
            <select onchange="App.docExtraido.tipo=this.value" style="width:100%;padding:.5rem;border:1px solid #ddd;border-radius:8px;margin-top:.2rem">
              <option value="factura" ${d.tipo==='factura'?'selected':''}>Factura</option>
              <option value="comprobante" ${d.tipo==='comprobante'?'selected':''}>Comprobante de pago</option>
              <option value="factura_proveedor" ${d.tipo==='factura_proveedor'?'selected':''}>Factura de proveedor</option>
            </select></div>
          ${inp('Emisor','emisor',d.emisor)}
          ${inp('CUIT','cuit',d.cuit)}
        </div>
        <div style="display:flex;gap:.6rem;flex-wrap:wrap;margin-bottom:.6rem">
          ${inp('Número','numero',d.numero)}
          ${inp('Fecha','fecha',d.fecha,'type=date')}
          ${inp('Importe total','importeTotal',d.importeTotal,'type=number')}
          ${inp('CAE','cae',d.cae)}
        </div>
        <h4 style="font-size:.85rem;color:var(--violeta-osc);margin:.6rem 0 .3rem">Ítems (línea por línea)</h4>
        <table class="tabla"><thead><tr><th>Descripción</th><th>Cant</th><th style="text-align:right">Subtotal</th><th></th></tr></thead><tbody id="doc-items">${itemsRows||'<tr><td colspan="4" style="color:#aaa;text-align:center">Sin ítems detectados — agregá manual si querés</td></tr>'}</tbody></table>
        <button class="btn btn-ghost btn-sm" style="margin-top:.5rem" onclick="App.docExtraido.items.push({descripcion:'',cantidad:1,precioUnitario:0,subtotal:0});App.docRenderForm(App.docExtraido)">+ Agregar ítem</button>
        <button class="btn btn-violeta" style="width:100%;margin-top:.8rem" onclick="App.docGuardar()">Guardar documento</button>
      </div>`;
  },
  async docGuardar(){
    const d=this.docExtraido; if(!d){this.toast('Subí un documento primero','err');return;}
    try{
      const r=await fetch(API+'/documentos',{method:'POST',headers:this.headers(),body:JSON.stringify({accion:'guardar',doc:d,items:d.items||[],token:this.token})});
      const res=await r.json();
      if(res.success){this.toast('✓ Documento guardado','ok');this.docExtraido=null;this.cargarDocumentos();}
      else this.toast(res.error||'Error','err');
    }catch(e){this.toast(e.message,'err');}
  },
  async docVer(id){
    this.abrirModal('Documento','<div class="spin">Cargando…</div>');
    try{
      const r=await fetch(API+'/documentos?id='+id+'&token='+encodeURIComponent(this.token),{headers:this.headers()});
      const d=await r.json(); const x=d.documento||{};
      const items=(d.items||[]).map(i=>`<tr><td>${i.descripcion}</td><td style="text-align:center">${i.cantidad}</td><td style="text-align:right">${this.money(i.subtotal)}</td></tr>`).join('')||'<tr><td colspan=3 style="text-align:center;color:#aaa">Sin ítems</td></tr>';
      document.getElementById('modal-body').innerHTML=`
        <table class="tabla" style="margin-bottom:.8rem">
          <tr><td>Tipo</td><td style="text-align:right;font-weight:600">${x.tipo}</td></tr>
          <tr><td>Emisor</td><td style="text-align:right">${x.emisor||'—'}</td></tr>
          <tr><td>CUIT</td><td style="text-align:right">${x.cuit||'—'}</td></tr>
          <tr><td>Número</td><td style="text-align:right">${x.numero||'—'}</td></tr>
          <tr><td>Fecha</td><td style="text-align:right">${x.fecha||'—'}</td></tr>
          <tr><td>CAE</td><td style="text-align:right">${x.cae||'—'}</td></tr>
          <tr><td>Total</td><td style="text-align:right;font-weight:700">${this.money(x.importe_total)}</td></tr>
        </table>
        <h4 style="font-size:.85rem;color:var(--violeta-osc);margin:.4rem 0">Ítems</h4>
        <table class="tabla"><thead><tr><th>Descripción</th><th>Cant</th><th style="text-align:right">Subtotal</th></tr></thead><tbody>${items}</tbody></table>
        ${x.archivo_url?`<a href="${x.archivo_url}" target="_blank" class="btn btn-ghost btn-sm" style="margin-top:.8rem">📎 Ver original</a>`:''}
        ${x.estado!=='revisado'?`<button class="btn btn-violeta btn-sm" style="margin-top:.8rem;margin-left:.4rem" onclick="App.docRevisar(${id})">✓ Marcar revisado</button>`:''}`;
    }catch(e){document.getElementById('modal-body').innerHTML='<div class="vacio">Error: '+e.message+'</div>';}
  },
  async docRevisar(id){
    try{const r=await fetch(API+'/documentos',{method:'POST',headers:this.headers(),body:JSON.stringify({accion:'revisar',id,estado:'revisado',token:this.token})});
      const d=await r.json();if(d.success){this.cerrarModal();this.toast('✓ Marcado revisado','ok');this.cargarDocumentos();}}catch(e){this.toast(e.message,'err');}
  },

    toast(msg,tipo){const t=document.getElementById('toast');t.textContent=msg;t.className='toast show '+(tipo||'');setTimeout(()=>{t.className='toast';},2400);}
};
document.getElementById('pin').addEventListener('keydown',e=>{if(e.key==='Enter')App.entrar();});
App.init();
</script>
